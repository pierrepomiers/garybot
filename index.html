// Rendu d'un bloc (table + note optionnelle) pour la preview HTML.
function renderPreviewBlockHtml(block) {
  const rowsHtml = block.items.map(it => {
    const qtyS = (Number(it.qty)||0).toString().replace(/\.0+$/, "");
    return `<tr>
      <td style="border:1px solid #ccc;padding:8px;">${escapeHtml(it.product_label||"")}</td>
      <td style="border:1px solid #ccc;padding:8px;text-align:right;">${qtyS}</td>
      <td style="border:1px solid #ccc;padding:8px;">${it.order_ref ? escapeHtml(it.order_ref) : "—"}</td>
    </tr>`;
  }).join("");

  const tableHtml = `
    <table style="border-collapse:collapse; width:100%; margin:8px 0;">
      <thead><tr style="background:#f0f0f0;">
        <th style="border:1px solid #ccc; padding:8px; text-align:left;">Article</th>
        <th style="border:1px solid #ccc; padding:8px; text-align:right;">Qté</th>
        <th style="border:1px solid #ccc; padding:8px; text-align:left;">Réf commande</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;

  const noteHtml = block.note
    ? `<p style="margin:4px 0 16px; font-style:italic; color:#555;"><strong>Note :</strong> ${escapeHtml(block.note)}</p>`
    : "";
  return tableHtml + noteHtml;
}

// Rendu du corps HTML d'un mail fournisseur (header + N blocs séparés + footer).
function renderSupplierMailBodyHtml(header, footer, blocks) {
  const blocksHtml = blocks.length === 0
    ? `<table style="border-collapse:collapse; width:100%; margin:8px 0;">
         <thead><tr style="background:#f0f0f0;">
           <th style="border:1px solid #ccc; padding:8px; text-align:left;">Article</th>
           <th style="border:1px solid #ccc; padding:8px; text-align:right;">Qté</th>
           <th style="border:1px solid #ccc; padding:8px; text-align:left;">Réf commande</th>
         </tr></thead>
         <tbody><tr><td colspan="3" style="border:1px solid #ccc;padding:12px;text-align:center;color:#888;font-style:italic;">Aucun article</td></tr></tbody>
       </table>`
    : blocks
        .map((b, i) => (i > 0 ? '<hr style="border:0; border-top:1px dashed #ccc; margin:20px 0;">' : "") + renderPreviewBlockHtml(b))
        .join("");

  return `
    <div style="font-family:Arial, sans-serif; color:#222; font-size:14px; line-height:1.5;">
      <p>${escapeHtml(header).replace(/\n/g,"<br>")}</p>
      ${blocksHtml}
      <p>${escapeHtml(footer).replace(/\n/g,"<br>")}</p>
    </div>`;
}

function renderSupplierMailPreview(supplier, items) {
  const ctx = { date: window.SUPPLIER_TEMPLATES.formatDate(), supplier_name: supplier.name };
  const subject = window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_subject || window.SUPPLIER_TEMPLATES.defaultSubject, ctx);
  const header  = window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_header  || window.SUPPLIER_TEMPLATES.defaultHeader,  ctx);
  const footer  = window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_footer  || window.SUPPLIER_TEMPLATES.defaultFooter,  ctx);

  const blocks = groupItemsByBatch(items);
  // Fallback vide : si panier vide, groupItemsByBatch renvoie [{note:null, items:[]}] — on force [] pour l'état vide.
  const blocksForRender = items.length === 0 ? [] : blocks;
  const previewHtml = renderSupplierMailBodyHtml(header, footer, blocksForRender);

  return `
    <div class="preview-subject"><strong>Sujet :</strong> ${escapeHtml(subject)}</div>
    <div class="preview-box">${previewHtml}</div>`;
}

function renderSupplierCarts() {
  const keys = Object.keys(S.suppliersByKey).filter(k => S.suppliersByKey[k].active !== false);
  // Tri : non vides d'abord
  keys.sort((a, b) => {
    const ca = pendingItemsForSupplier(a).length;
    const cb = pendingItemsForSupplier(b).length;
    if (cb !== ca) return cb - ca;
    return (S.suppliersByKey[a].name || "").localeCompare(S.suppliersByKey[b].name || "");
  });

  const cards = keys.map(k => {
    const sup = S.suppliersByKey[k];
    const items = pendingItemsForSupplier(k);
    const count = items.length;
    const schedule = sup.mail_mode === "hebdo"
      ? `Envoi groupé — ${WEEKDAYS_FR[sup.mail_jour] || "?"} ${String(sup.mail_heure||"").slice(0,5)}`
      : "";

    const itemsHtml = count === 0
      ? `<div class="supplier-cart-empty-hint">Panier vide — ajoute un article manuel ci-dessous.</div>`
      : items.map(it => `
          <div class="supplier-card-item" data-id="${it.id}">
            <input class="sci-label" data-id="${it.id}" type="text" value="${escapeHtml(it.product_label||"")}">
            <input class="sci-qty"   data-id="${it.id}" data-field="qty" type="number" min="0" step="any" value="${fmtQty(it.qty)}">
            <span class="sci-ref">${it.order_ref ? escapeHtml(it.order_ref) : (it.source==="manual"?"manuel":"—")}</span>
            <button class="sci-del" data-del="${it.id}" type="button" title="Retirer">×</button>
          </div>
        `).join("");

    const manualAddHtml = `
      <div class="supplier-cart-manual-add">
        <button type="button" class="btn-add-manual" data-add-manual="${k}">+ Ajouter un article manuel</button>
      </div>`;

    const previewOpen = S.expandedPreviews.has(k);
    const previewPanelHtml = previewOpen ? renderSupplierMailPreview(sup, items) : "";

    const missingEmail = !sup.email;
    return `
      <div class="supplier-card${count===0?" empty":""}" data-supplier-key="${k}">
        <div class="supplier-card-head">
          <div>
            <div class="sc-title">🏭 ${escapeHtml(sup.name)}</div>
            ${schedule ? `<div class="sc-schedule">${escapeHtml(schedule)}</div>` : ""}
            ${missingEmail ? `<div class="sc-schedule" style="color:var(--red)">⚠ email manquant — Réglages</div>` : ""}
          </div>
          <span class="sc-count${count===0?" zero":""}">${count} article${count>1?"s":""}</span>
        </div>
        <div class="supplier-card-body">
          ${itemsHtml}
          ${manualAddHtml}
        </div>
        <button type="button" class="supplier-preview-toggle" data-toggle-preview="${k}" aria-expanded="${previewOpen?"true":"false"}">
          <span>Aperçu du mail</span>
          <span class="spt-chevron" aria-hidden="true">${previewOpen?"▲":"▼"}</span>
        </button>
        ${previewOpen ? `<div class="supplier-preview-panel">${previewPanelHtml}</div>` : ""}
        <div class="supplier-card-footer">
          <button class="btn-send-cart" data-send-cart="${k}" ${count===0||missingEmail?"disabled":""}>📨 Envoyer le panier</button>
          <button class="btn-clear-cart" data-clear-cart="${k}" ${count===0?"disabled":""}>Vider</button>
        </div>
      </div>`;
  }).join("") || `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Aucun fournisseur configuré</div></div>`;

  return `<div id="supplier-carts-screen">
    <div class="settings-title" style="margin-bottom:14px;">📦 PANIERS FOURNISSEURS</div>
    <div class="supplier-cards">${cards}</div>
  </div>`;
}

function bindSupplierCarts() {
  bindNav();

  // Edit inline label / qty (blur = save)
  document.querySelectorAll(".sci-label").forEach(inp => inp.addEventListener("blur", async e => {
    const id = inp.dataset.id; const val = e.target.value.trim();
    if (!val) return;
    const { error } = await sb.from("supplier_cart_items").update({ product_label: val }).eq("id", id);
    if (error) { console.warn(error); showToast("⚠ Maj label échouée"); return; }
    const row = S.supplierCartItems.find(r => r.id === id); if (row) row.product_label = val;
    if (row && S.expandedPreviews.has(row.supplier_key)) render();
  }));
  document.querySelectorAll(".sci-qty").forEach(inp => {
    inp.addEventListener("blur", async e => {
      const id = inp.dataset.id; const qty = parseFloat(e.target.value);
      if (!isFinite(qty) || qty <= 0) { showToast("⚠ Quantité invalide"); return; }
      const { error } = await sb.from("supplier_cart_items").update({ qty }).eq("id", id);
      if (error) { console.warn(error); showToast("⚠ Maj qty échouée"); return; }
      const row = S.supplierCartItems.find(r => r.id === id); if (row) row.qty = qty;
      if (row && S.expandedPreviews.has(row.supplier_key)) render();
    });
    bindQtyArrowKeys(inp);
  });
  document.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", async () => {
    const id = btn.dataset.del;
    const { error } = await sb.from("supplier_cart_items").delete().eq("id", id);
    if (error) { showToast("⚠ Suppression échouée"); return; }
    S.supplierCartItems = S.supplierCartItems.filter(r => r.id !== id);
    render();
  }));
  document.querySelectorAll("[data-clear-cart]").forEach(btn => btn.addEventListener("click", async () => {
    const key = btn.dataset.clearCart;
    if (!confirm(`Vider le panier ${S.suppliersByKey[key]?.name || key} ?`)) return;
    const { error } = await sb.from("supplier_cart_items").delete().eq("supplier_key", key).is("sent_at", null);
    if (error) { showToast("⚠ Vidage échoué"); return; }
    S.supplierCartItems = S.supplierCartItems.filter(r => r.supplier_key !== key);
    render();
  }));
  document.querySelectorAll("[data-send-cart]").forEach(btn => btn.addEventListener("click", async () => {
    const key = btn.dataset.sendCart;
    const supplier = S.suppliersByKey[key];
    if (!supplier) return;
    const items = pendingItemsForSupplier(key);
    if (items.length === 0) return;
    openSupplierSendPreview(supplier, items);
  }));

  document.querySelectorAll("[data-toggle-preview]").forEach(btn => btn.addEventListener("click", () => {
    const key = btn.dataset.togglePreview;
    if (S.expandedPreviews.has(key)) S.expandedPreviews.delete(key);
    else S.expandedPreviews.add(key);
    render();
  }));

  document.querySelectorAll("[data-add-manual]").forEach(btn => btn.addEventListener("click", async () => {
    const key = btn.dataset.addManual;
    btn.disabled = true;
    const row = {
      supplier_key: key,
      order_id: null,
      order_ref: null,
      step_id: null,
      product_label: "",
      qty: 1,
      source: "manual",
      notes: null,
      // Ajout manuel isolé : chaque item a son propre groupe (= 1 bloc par item manuel côté mail)
      batch_group_id: crypto.randomUUID(),
      added_by: S.user?.email || null,
      sent_at: null,
    };
    const { data, error } = await sb.from("supplier_cart_items").insert(row).select().single();
    if (error) {
      console.warn("add manual item:", error);
      showToast("⚠ Ajout impossible : " + (error.message || "erreur Supabase"));
      btn.disabled = false;
      return;
    }
    S.supplierCartItems.push(data);
    render();
    const newLabel = document.querySelector(`.sci-label[data-id="${data.id}"]`);
    if (newLabel) { newLabel.focus(); newLabel.select(); }
  }));
}

// Modal d'envoi fournisseur avec édition ponctuelle du sujet/header/footer.
// Les valeurs initiales viennent du template du fournisseur (Réglages) ;
// toute modif est locale à l'ouverture (réinitialisée à chaque appel).
// opts.rollbackOnCancel : si true, l'annulation supprime les items ciblés par
// opts.rollbackIds (cas flux A : items insérés juste avant l'ouverture).
// Flux B (vue Paniers) n'utilise PAS ce flag : les items préexistants restent.
function openSupplierSendPreview(supplier, items, opts = {}) {
  const ctx = { date: window.SUPPLIER_TEMPLATES.formatDate(), supplier_name: supplier.name };
  const initialSubject = window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_subject || window.SUPPLIER_TEMPLATES.defaultSubject, ctx);
  const initialHeader  = window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_header  || window.SUPPLIER_TEMPLATES.defaultHeader,  ctx);
  const initialFooter  = window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_footer  || window.SUPPLIER_TEMPLATES.defaultFooter,  ctx);

  // Valeurs locales : écrasées à chaque ouverture, jamais persistées.
  let localSubject = initialSubject;
  let localHeader  = initialHeader;
  let localFooter  = initialFooter;

  // Blocs figés : pas éditables, calculés une seule fois.
  const blocks = groupItemsByBatch(items);

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">
          <span class="modal-title-icon" aria-hidden="true">📨</span>
          <span class="modal-title-text">
            <span>Envoyer à ${escapeHtml(supplier.name)}</span>
            <small>${escapeHtml(supplier.email)} · ${items.length} article${items.length>1?"s":""}</small>
          </span>
        </div>
        <button class="modal-close" data-close>×</button>
      </div>
      <div class="modal-body">
        <div>
          <label class="field-label field-label-edit" for="ssp-subject">✎ Sujet (éditable)</label>
          <input id="ssp-subject" class="field-input ssp-editable" type="text" value="${escapeHtml(initialSubject)}">
        </div>
        <div>
          <label class="field-label field-label-edit" for="ssp-header">✎ Début du mail (éditable)</label>
          <textarea id="ssp-header" class="field-textarea ssp-edit-area ssp-editable" rows="5">${escapeHtml(initialHeader)}</textarea>
        </div>
        <div>
          <label class="field-label field-label-readonly">👁 Aperçu du rendu (non éditable)</label>
          <div class="preview-box ssp-preview-readonly" id="ssp-preview"></div>
        </div>
        <div>
          <label class="field-label field-label-edit" for="ssp-footer">✎ Fin du mail (éditable)</label>
          <textarea id="ssp-footer" class="field-textarea ssp-edit-area ssp-editable" rows="4">${escapeHtml(initialFooter)}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" data-close>Annuler</button>
        <button class="btn-modal-send" id="confirm-send">📨 Envoyer</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.body.style.overflow = "hidden";
  document.body.style.position = "fixed";
  document.body.style.width = "100%";

  const subjectEl = overlay.querySelector("#ssp-subject");
  const headerEl  = overlay.querySelector("#ssp-header");
  const footerEl  = overlay.querySelector("#ssp-footer");
  const previewEl = overlay.querySelector("#ssp-preview");

  function updatePreviewHtml() {
    previewEl.innerHTML = renderSupplierMailBodyHtml(localHeader, localFooter, blocks);
  }
  updatePreviewHtml();

  subjectEl.addEventListener("input", e => { localSubject = e.target.value; });
  headerEl.addEventListener("input", e => {
    localHeader = e.target.value;
    updatePreviewHtml();
  });
  footerEl.addEventListener("input", e => {
    localFooter = e.target.value;
    updatePreviewHtml();
  });

  // sent=true évite le rollback quand close() est appelé après un envoi réussi.
  let sent = false;

  async function close() {
    // Flux A : si l'utilisateur annule (fermeture sans envoi), on retire les items
    // qu'on vient d'insérer en DB. Ciblage par id exact → pas de risque de
    // supprimer des items legitimes d'un autre onglet.
    if (!sent && opts?.rollbackOnCancel && Array.isArray(opts.rollbackIds) && opts.rollbackIds.length) {
      try {
        const { error } = await sb.from("supplier_cart_items").delete().in("id", opts.rollbackIds);
        if (error) throw error;
        const idsSet = new Set(opts.rollbackIds);
        S.supplierCartItems = S.supplierCartItems.filter(it => !idsSet.has(it.id));
      } catch (err) {
        console.error("Rollback failed:", err);
        showToast("⚠ Impossible d'annuler l'insertion en panier, vérifier");
      }
    }
    document.body.style.overflow = ""; document.body.style.position = ""; document.body.style.width = "";
    overlay.remove();
    document.removeEventListener("keydown", onKey);
    render();
  }
  function onKey(e) { if (e.key==="Escape") close(); }
  document.addEventListener("keydown", onKey);
  overlay.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", close));
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });

  overlay.querySelector("#confirm-send").addEventListener("click", async () => {
    const btn = overlay.querySelector("#confirm-send");
    btn.disabled = true; btn.innerHTML = `<span class="spinner-xs"></span> Envoi…`;
    try {
      // items sont les rows complètes de supplier_cart_items (batch_group_id, notes, added_at inclus).
      // sendSupplierBatch les groupe par batch_group_id → N blocs.
      // Si tous les items partagent la même (order_id, step_id), on les passe
      // à sendSupplierBatch pour que la relance future soit possible. Sinon (envoi
      // multi-commandes depuis la vue Paniers), on les laisse null.
      const oids = new Set(items.map(it => it.order_id));
      const sids = new Set(items.map(it => it.step_id));
      const unifiedOrderId = oids.size === 1 ? [...oids][0] : null;
      const unifiedStepId  = sids.size === 1 ? [...sids][0] : null;
      const result = await sendSupplierBatch(supplier, items, {
        orderId: unifiedOrderId,
        stepId: unifiedStepId,
        subjectOverride: localSubject,
        headerOverride:  localHeader,
        footerOverride:  localFooter,
      });
      sent = true;
      close();
      if (!result.warning) {
        showToast(`✓ Envoyé à ${supplier.name} — ${items.length} article${items.length>1?"s":""}`);
      }
      render();
    } catch (err) {
      console.error(err);
      btn.disabled = false; btn.innerHTML = "📨 Envoyer";
      showToast("⚠ Échec envoi mail : " + (err.message || err));
    }
  });
}

// ── Modal de relance fournisseur ───────────────────────────────────────────
// Ouvre une modal pour relancer un fournisseur sur une étape donnée.
// Pré-remplit sujet/en-tête, relit les items du batch d'origine depuis
// supplier_cart_items, puis POST /supplier-cart/send avec is_reminder=true
// et parent_batch_id = batch_id du premier envoi.
async function openReminderModal(order, stepId, supplierKey) {
  const supplier = S.suppliersByKey[supplierKey];
  if (!supplier) { showToast("⚠ Fournisseur inconnu"); return; }
  if (!supplier.email) { showToast("⚠ Email fournisseur manquant — renseigne-le dans Réglages"); return; }

  const bySupplier = S.sendHistoryIndex.get(`${order.id}|${stepId}`);
  const stats = bySupplier ? bySupplier.get(supplierKey) : null;
  if (!stats || !stats.first_batch_id) {
    showToast("⚠ Aucun envoi initial à relancer");
    return;
  }

  const firstSentAt = stats.logs.find(l => !l.is_reminder)?.sent_at || stats.logs[0]?.sent_at;

  // Relire les items de l'envoi d'origine
  const { data: originItems, error: itemsErr } = await sb
    .from("supplier_cart_items")
    .select("id, product_label, qty, order_ref, source")
    .eq("batch_id", stats.first_batch_id)
    .order("added_at", { ascending: true });
  if (itemsErr) {
    console.error("load origin items:", itemsErr);
    showToast("⚠ Lecture des articles d'origine échouée");
    return;
  }
  if (!originItems || originItems.length === 0) {
    showToast("⚠ Aucun article trouvé pour le batch d'origine");
    return;
  }

  const firstSentFmt = fmtDate(firstSentAt);
  const defaultSubject = `RELANCE — ${stats.last_subject || "Commande NOTOX"}`;
  const defaultHeader  = `Bonjour, suite à notre commande du ${firstSentFmt}, je me permets de vous relancer. Merci de me confirmer la bonne réception et les délais de livraison. Voici le détail pour rappel :`;

  const rowsHtml = originItems.map(it => {
    const qtyS = (Number(it.qty)||0).toString().replace(/\.0+$/, "");
    return `<tr>
      <td>${escapeHtml(it.product_label||"")}</td>
      <td>${qtyS}</td>
      <td>${escapeHtml(it.order_ref||"")}</td>
    </tr>`;
  }).join("");

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">
          <span class="modal-title-icon" aria-hidden="true">🔄</span>
          <span class="modal-title-text">
            <span>Relance fournisseur</span>
            <small>${escapeHtml(supplier.name)} · ${escapeHtml(supplier.email)}</small>
          </span>
        </div>
        <button class="modal-close" data-close aria-label="Fermer">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-info-banner">
          ${stats.count_total} envoi${stats.count_total>1?"s":""} déjà effectué${stats.count_total>1?"s":""} (dont ${stats.count_reminders} relance${stats.count_reminders>1?"s":""}). Dernier : ${escapeHtml(fmtDateTime(stats.last_sent_at))}.
        </div>
        <div>
          <label class="field-label" for="rm-subject">Sujet</label>
          <input id="rm-subject" class="field-input" type="text" value="${escapeHtml(defaultSubject)}">
        </div>
        <div>
          <label class="field-label" for="rm-header">En-tête</label>
          <textarea id="rm-header" class="field-textarea" spellcheck="true">${escapeHtml(defaultHeader)}</textarea>
        </div>
        <div>
          <label class="field-label">Articles du batch d'origine</label>
          <table class="reminder-preview-table">
            <thead><tr><th>Article</th><th>Qté</th><th>Réf</th></tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" data-close>Annuler</button>
        <button class="btn-modal-send" id="rm-confirm">🔄 Confirmer la relance</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  document.body.style.overflow = "hidden";
  document.body.style.position = "fixed";
  document.body.style.width = "100%";

  const subjectEl = overlay.querySelector("#rm-subject");
  const headerEl  = overlay.querySelector("#rm-header");
  const btnConfirm = overlay.querySelector("#rm-confirm");

  function close() {
    document.body.style.overflow = ""; document.body.style.position = ""; document.body.style.width = "";
    overlay.remove();
    document.removeEventListener("keydown", onKey);
  }
  function onKey(e) { if (e.key === "Escape") close(); }
  document.addEventListener("keydown", onKey);
  overlay.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", close));
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });

  btnConfirm.addEventListener("click", async () => {
    const subjectVal = subjectEl.value.trim();
    const headerVal  = headerEl.value.trim();
    if (!subjectVal) { showToast("⚠ Sujet vide"); return; }
    if (!headerVal)  { showToast("⚠ En-tête vide"); return; }

    btnConfirm.disabled = true; btnConfirm.innerHTML = `<span class="spinner-xs"></span> Envoi…`;
    try {
      const toSend = originItems.map(it => ({
        id: it.id,
        product_label: it.product_label,
        qty: Number(it.qty) || 1,
        order_ref: it.order_ref || null,
      }));
      const result = await sendSupplierBatch(supplier, toSend, {
        orderId: order.id,
        stepId,
        isReminder: true,
        parentBatchId: stats.first_batch_id,
        subjectOverride: subjectVal,
        headerOverride: headerVal,
      });
      close();
      if (!result.warning) {
        showToast(`✓ Relance envoyée à ${supplier.name}`);
      }
      render();
    } catch (err) {
      console.error(err);
      btnConfirm.disabled = false; btnConfirm.innerHTML = "🔄 Confirmer la relance";
      showToast("⚠ Échec envoi relance : " + (err.message || err));
    }
  });

  setTimeout(() => subjectEl?.focus(), 50);
}

function showToast(msg, duration = 2700) {
  const t = document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), duration);
}

function filteredOrders() {
  let orders = S.orders.filter(o => !S.meta[o.id]?.archived);
  if (S.search) { const q=S.search.toLowerCase(); orders=orders.filter(o=>(o.name||"").toLowerCase().includes(q)||(o.partner_detail?.name||"").toLowerCase().includes(q)); }
  if (S.filter==="pending") orders=orders.filter(o=>getProgress(o.id)<100);
  if (S.filter==="done")    orders=orders.filter(o=>getProgress(o.id)===100);
  if (S.filter==="urgent")  orders=orders.filter(o=>S.meta[o.id]?.priority==="urgent");
  // Trier : urgent en premier, puis par date
  orders.sort((a,b) => {
    const ap = S.meta[a.id]?.priority==="urgent" ? 0:1;
    const bp = S.meta[b.id]?.priority==="urgent" ? 0:1;
    if (ap!==bp) return ap-bp;
    return new Date(b.date_order||0) - new Date(a.date_order||0);
  });
  return orders;
}

function render() {
  const app = document.getElementById("app");
  if (!sb)             { app.innerHTML=`<div class="loading"><div class="spinner"></div><br>Init...</div>`; return; }
  if (S.view==="login")    { app.innerHTML=renderLogin();              bindLogin();    return; }
  if (S.view==="settings") { app.innerHTML=renderShell(renderSettings()); bindSettings(); return; }
  if (S.view==="supplier_carts") { app.innerHTML=renderShell(renderSupplierCarts()); bindSupplierCarts(); return; }
  app.innerHTML=renderShell(renderOrders());
  bindOrders();
}

// ── ORDERS ──
function renderOrders() {
  const active    = S.orders.filter(o=>!S.meta[o.id]?.archived);
  const archived  = S.orders.filter(o=>S.meta[o.id]?.archived);
  const enCours   = active.filter(o=>getProgress(o.id)<100).length;
  const terminees = active.filter(o=>getProgress(o.id)===100).length;
  const orders    = filteredOrders();

  const reminders = Object.values(S.suppliersByKey)
    .map(s => ({ supplier: s, reminder: computeSupplierReminder(s) }))
    .filter(x => x.reminder !== null)
    .sort((a, b) => b.reminder.daysOverdue - a.reminder.daysOverdue);
  const remindersHtml = reminders.length === 0 ? "" : `
    <div class="reminders-container">
      ${reminders.map(({ supplier, reminder }) => `
        <div class="reminder-banner ${reminder.className}"
             data-reminder-supplier-key="${escapeHtml(supplier.key)}"
             role="button" tabindex="0">
          <span class="reminder-text">${escapeHtml(reminder.wording)}</span>
          <span class="reminder-arrow">→</span>
        </div>`).join("")}
    </div>`;

  return `
  ${remindersHtml}
  <div class="stats-bar">
    <div class="stat-chip stat-spacer" aria-hidden="true"></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--orange)">${enCours}</span><span class="stat-label">en cours</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--green)">${terminees}</span><span class="stat-label">finies</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--muted)">${archived.length}</span><span class="stat-label">livrées</span></div>
  </div>
  <div class="toolbar">
    <input class="search-input" id="search-input" placeholder="🔍 Ref, client..." value="${S.search}">
    <select class="filter-select" id="filter-select">
      <option value="all"     ${S.filter==="all"    ?"selected":""}>Toutes</option>
      <option value="pending" ${S.filter==="pending"?"selected":""}>En cours</option>
      <option value="done"    ${S.filter==="done"   ?"selected":""}>Finies</option>
      <option value="urgent"  ${S.filter==="urgent" ?"selected":""}>Urgentes</option>
    </select>
  </div>
  <div class="orders-container" id="orders-container">
    ${renderOrdersListInner(orders)}
  </div>`;
}

function renderOrdersListInner(orders) {
  if (S.loading) return `<div class="loading"><div class="spinner"></div><br>Chargement...</div>`;
  if (orders.length === 0) return `<div class="empty-state"><div class="empty-icon">🏄</div><div class="empty-text">Aucune commande</div></div>`;
  return orders.map(o=>renderCard(o)).join("");
}

// Re-render partiel : met à jour uniquement la liste des commandes sans
// recréer le header, la toolbar, ni l'input de recherche (évite la perte
// de focus sur mobile à chaque frappe).
function rerenderOrdersList() {
  const container = document.getElementById("orders-container");
  if (!container) return;
  container.innerHTML = renderOrdersListInner(filteredOrders());
  bindOrderCards();
}

function renderCard(order) {
  const oid   = order.id;
  const prog  = getProgress(oid);
  const isExp = S.expanded.has(oid);
  const meta  = S.meta[oid] || { delivery_type:null, priority:"normal" };
  const ship  = order.shipping_detail || order.partner_detail || {};
  const part  = order.partner_detail || {};
  const isUrgent = meta.priority==="urgent";
  const isPending = S.archivePending.has(oid);

  const cardClass = isUrgent?"urgent":prog===100?"complete":prog>0?"in-progress":"";

  const linesHtml = (order.lines_detail||[]).slice(0,6).map(l=>{
    const label = l.product_id?.[1] || (l.name || "—").replace(/\n/g, "<br>");
    return `<div class="line-item"><strong>${label}</strong> × ${l.product_uom_qty} — ${fmtAmount(l.price_subtotal)}</div>`;
  }).join("") + (order.lines_detail?.length>6?`<div class="line-item" style="color:var(--muted)">+${order.lines_detail.length-6} autres...</div>`:"");

  const archiveBanner = isPending ? `
    <div class="archive-banner">
      <span class="archive-banner-text">✅ Livraison cochée — archiver dans ${S.settings.archive_delay_days}j ?</span>
      <div style="display:flex;gap:6px;">
        <button class="archive-confirm-btn" data-archive="${oid}">Archiver</button>
        <button class="archive-cancel-btn" data-unarchive="${oid}">Annuler</button>
      </div>
    </div>` : "";

  const phone = part.phone || "";
  const email = part.email || "";
  const contactRow = `
    <div class="meta-row">
      <button class="priority-btn ${isUrgent?"urgent":"normal"}" data-priority="${oid}">${isUrgent?"🔴 Urgent":"🟢 Normal"}</button>
      ${phone ? `<a href="tel:${encodeURI(phone)}" class="contact-chip contact-mobile" title="Appeler ${phone}">📞 Tél.</a>` : ""}
      ${phone ? `<a href="sms:${encodeURI(phone)}" class="contact-chip contact-mobile" title="SMS à ${phone}">💬 SMS</a>` : ""}
      ${phone ? `<span class="contact-chip contact-desktop" title="Numéro client">📞 ${phone}</span>` : ""}
      ${email ? `<a href="mailto:${email}" class="contact-chip" title="Email à ${email}">✉️ Mail</a>` : ""}
    </div>`;

  const hasShip = orderHasShipLine(order);
  const odooOrderUrl = `${CONFIG.odooWebUrl}/web#id=${oid}&model=sale.order&view_type=form`;
  const stepsHtml = STEPS.filter(step => step.id !== "emballage" || hasShip).map(step => {
    const check  = (S.steps[oid]||{})[step.id]||{};
    const isDone = !!check.done;

    let clientHtml = "";
    if (step.clientMail && isDone) {
      const lastClientSent = meta.emails_sent?.[step.id];
      const clientDateLabel = lastClientSent ? ` · ${fmtShortDate(lastClientSent)}` : "";
      const clientSentClass = lastClientSent ? " has-sent" : "";
      clientHtml=`<button class="mail-btn mail-client${clientSentClass}" data-msg-oid="${oid}" data-msg-step="${step.id}" title="Écrire au client">✉️ client${clientDateLabel}</button>`;
    }

    let invoiceHtml = "";
    if (step.id === "facturation" && !meta.archived) {
      const clickAt = meta.emails_sent?.facturation_click;
      const dateLabel = isDone && clickAt ? ` · ${fmtShortDate(clickAt)}` : "";
      const doneClass = isDone ? " done" : "";
      invoiceHtml = `<a href="${odooOrderUrl}" target="_blank" rel="noopener" class="mail-btn to-invoice${doneClass}" data-invoice-oid="${oid}" title="Ouvrir la commande dans Odoo pour facturer"><strong>À FACTURER 💰${dateLabel}</strong></a>`;
    }

    let deliveryPillHtml = "";
    if (step.id === "livraison" && !meta.archived) {
      const clickAt = meta.emails_sent?.livraison_click;
      const dateLabel = isDone && clickAt ? ` · ${fmtShortDate(clickAt)}` : "";
      const doneClass = isDone ? " done" : "";
      deliveryPillHtml = `<a href="${odooOrderUrl}" target="_blank" rel="noopener" class="mail-btn to-invoice${doneClass}" data-delivery-oid="${oid}" title="Ouvrir la commande dans Odoo pour valider la livraison"><strong>À VALIDER 📦${dateLabel}</strong></a>`;
    }

    let supplierBtnHtml = "";
    let reminderBtnsHtml = "";
    if (step.fourn && isDone) {
      const hasSent = S.supplierSentIndex.has(`${oid}|${step.id}`);
      const sends = getSupplierSendsForStep(oid, step.id);
      let supplierDateLabel = "";
      if (hasSent) {
        const lastDates = sends.map(s => s.stats.last_sent_at).filter(Boolean);
        if (lastDates.length > 0) {
          const maxDate = lastDates.reduce((a, b) => a > b ? a : b);
          supplierDateLabel = ` · ${fmtShortDate(maxDate)}`;
        }
      }
      supplierBtnHtml=`<button class="mail-btn mail-supplier${hasSent?" has-sent":""}" data-supplier-oid="${oid}" data-supplier-step="${step.id}" title="Préparer commande fournisseur">📦 ${hasSent?"✓ ":""}fournisseur${supplierDateLabel}</button>`;

      reminderBtnsHtml = sends
        .filter(s => s.stats.first_batch_id) // besoin du batch d'origine pour relancer
        .map(s => {
          const countLabel = s.stats.count_reminders > 0 ? `🔄 ${s.stats.count_reminders}` : `🔄`;
          const lastShort  = fmtShortDate(s.stats.last_sent_at);
          return `<button class="mail-btn mail-reminder" data-reminder-oid="${oid}" data-reminder-step="${step.id}" data-reminder-supplier="${escapeHtml(s.key)}" title="Relancer ${escapeHtml(s.name)}">${countLabel} ${escapeHtml(s.name)} · ${lastShort}</button>`;
        }).join("");
    }

    let livrHtml = "";
    if (step.isLivraison) {
      const isRetrait = getEffectiveDeliveryType(order, meta)==="retrait";
      const addr = buildAddr(ship);
      livrHtml=`<div class="livraison-info">
        <div class="livraison-toggle">
          <button class="type-btn${!isRetrait?" active":""}" data-oid="${oid}" data-type="livraison">🚚 Livraison</button>
          <button class="type-btn${isRetrait?" active":""}" data-oid="${oid}" data-type="retrait">📍 Retrait</button>
        </div>
        ${!isRetrait?`
          ${addr?`<div class="addr">📍 ${addr}</div>`:""}
          ${part.email?`<div>✉️ ${part.email}</div>`:""}
          ${(part.phone||part.mobile)?`<div>📞 ${part.phone||part.mobile}</div>`:""}
        `:`<div style="color:#a3e635">✓ Retrait sur place</div>`}
      </div>`;
    }

    return `<div class="step-row${isDone?" done":""}">
      <div class="step-row-top">
        <button class="step-check" data-oid="${oid}" data-step="${step.id}">${isDone?"✅":"☑️"}</button>
        <span class="step-label">${step.label}</span>
        ${supplierBtnHtml}${reminderBtnsHtml}${clientHtml}${invoiceHtml}${deliveryPillHtml}
      </div>
      ${livrHtml}
    </div>`;
  }).join("");

  const odooHref = order.id ? `${CONFIG.odooWebUrl}/odoo/sales/${order.id}` : null;
  const extraMeta = !!meta.due_date;

  return `<div class="order-card ${cardClass}">
    <div class="card-header" data-toggle="${oid}">
      <div style="min-width:0;flex:1;">
        <div class="card-ref-row">
          ${odooHref
            ? `<a class="card-ref" href="${odooHref}" target="_blank" rel="noopener noreferrer" data-stop-toggle="1">${order.name}</a>`
            : `<span class="card-ref">—</span>`}
          <button class="pdf-btn" data-pdf-oid="${oid}" data-pdf-name="${order.name||oid}" title="Télécharger PDF" data-stop-toggle="1">📄</button>
          <span class="card-ref-meta">${fmtDate(order.date_order)} · ${fmtAmount(order.amount_total)}</span>
          ${isUrgent?'<span class="urgent-badge">URGENT</span>':""}
        </div>
        <div class="card-client">${part.name||"—"}</div>
        ${extraMeta ? `<div class="card-meta">
          ${meta.due_date?`<span style="color:var(--accent)">📅 ${fmtDate(meta.due_date)}</span>`:""}
        </div>` : ""}
      </div>
      <div class="card-right">
        <div class="progress-badge ${pClass(prog)}">${prog}%</div>
        <div class="expand-icon${isExp?" open":""}" aria-hidden="true">▼</div>
      </div>
    </div>
    <div class="progress-bar-thin"><div class="progress-fill" style="width:${prog}%;background:${pColor(prog)}"></div></div>
    ${isExp?`
      ${archiveBanner}
      ${contactRow}
      <div class="lines-summary">
        <div class="lines-title">CONTENU COMMANDE</div>
        ${linesHtml||'<div class="line-item">—</div>'}
      </div>
      <div class="card-body">${stepsHtml}</div>
    `:""}
  </div>`;
}

// Bindings qui s'appliquent uniquement aux éléments à l'intérieur de
// #orders-container — réutilisés par rerenderOrdersList() pour ne pas
// dupliquer les listeners du header / de la toolbar.
function bindOrderCards() {
  document.querySelectorAll("[data-toggle]").forEach(el=>el.addEventListener("click", (e)=>{
    if (e.target.closest("[data-stop-toggle]")) return;
    const oid=parseInt(el.dataset.toggle);
    const wasExpanded = S.expanded.has(oid);
    S.expanded.clear();
    if (!wasExpanded) S.expanded.add(oid);
    render();
    if (!wasExpanded) {
      setTimeout(()=>{
        const card = document.querySelector(`[data-toggle="${oid}"]`)?.closest(".order-card");
        if (card) {
          const rect = card.getBoundingClientRect();
          const offsetTop = window.pageYOffset + rect.top - 128;
          window.scrollTo({ top: offsetTop, behavior:"smooth" });
        }
      }, 50);
    }
  }));
  document.querySelectorAll(".step-check").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation();
    const oid=parseInt(btn.dataset.oid), stepId=btn.dataset.step;
    const currentDone = (S.steps[oid]||{})[stepId]?.done||false;
    // Facturation : uniquement via la pastille "À FACTURER 💰", jamais via la case.
    if (stepId === "facturation") return;
    // Livraison : pastille "À VALIDER 📦" universelle (passage obligé par Odoo pour clôturer).
    // Case pas ✅ → confirm. Case déjà ✅ → décoche normale (retour en arrière rapide, pas de confirm).
    if (stepId === "livraison" && !currentDone) {
      if (!confirm("Tu es sûr ? Tu n'as pas validé la livraison côté Odoo.")) return;
    }
    toggleStep(oid, stepId, currentDone);
  }));
  document.querySelectorAll("[data-type]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation(); setDeliveryType(parseInt(btn.dataset.oid), btn.dataset.type);
  }));
  document.querySelectorAll("[data-priority]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation();
    const oid=parseInt(btn.dataset.priority);
    const cur = S.meta[oid]?.priority||"normal";
    setMeta(oid, "priority", cur==="urgent"?"normal":"urgent").then(()=>render());
  }));
  document.querySelectorAll("[data-meta-field]").forEach(input=>input.addEventListener("blur", ()=>{
    setMeta(parseInt(input.dataset.oid), input.dataset.metaField, input.value);
  }));
  document.querySelectorAll("[data-archive]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation(); archiveOrder(parseInt(btn.dataset.archive));
  }));
  document.querySelectorAll("[data-unarchive]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation(); unarchiveOrder(parseInt(btn.dataset.unarchive));
  }));
  document.querySelectorAll("[data-pdf-oid]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation();
    downloadOrderPdf(parseInt(btn.dataset.pdfOid), btn.dataset.pdfName, btn);
  }));
  document.querySelectorAll("[data-msg-oid]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation();
    const oid = parseInt(btn.dataset.msgOid);
    const stepId = btn.dataset.msgStep;
    const order = S.orders.find(o => o.id === oid);
    const step  = STEPS.find(s => s.id === stepId);
    if (order && step) openClientMessageModal(order, step.label, stepId, getProgress(oid));
  }));
  document.querySelectorAll("[data-supplier-oid]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation();
    const oid = parseInt(btn.dataset.supplierOid);
    const stepId = btn.dataset.supplierStep;
    const order = S.orders.find(o => o.id === oid);
    const step  = STEPS.find(s => s.id === stepId);
    if (order && step) openSupplierCartModal(order, step.label, stepId, getProgress(oid));
  }));
  document.querySelectorAll("[data-reminder-oid]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation();
    const oid = parseInt(btn.dataset.reminderOid);
    const stepId = btn.dataset.reminderStep;
    const supplierKey = btn.dataset.reminderSupplier;
    const order = S.orders.find(o => o.id === oid);
    if (order && supplierKey) openReminderModal(order, stepId, supplierKey);
  }));
  // Pastille "À FACTURER 💰" : <a target="_blank"> ouvre Odoo nativement.
  // Le handler coche la case facturation (si pas encore ✅) et trace le clic.
  document.querySelectorAll("[data-invoice-oid]").forEach(el=>el.addEventListener("click", e=>{
    e.stopPropagation();
    const oid = parseInt(el.dataset.invoiceOid);
    const order = S.orders.find(o => o.id === oid);
    if (!order) return;
    recordOdooPastilleClick(order, "facturation_click");
    const isDone = !!(S.steps[oid]||{}).facturation?.done;
    if (!isDone) toggleStep(oid, "facturation", false);
  }));
  // Pastille "À VALIDER 📦" : même pattern pour l'étape livraison.
  document.querySelectorAll("[data-delivery-oid]").forEach(el=>el.addEventListener("click", e=>{
    e.stopPropagation();
    const oid = parseInt(el.dataset.deliveryOid);
    const order = S.orders.find(o => o.id === oid);
    if (!order) return;
    recordOdooPastilleClick(order, "livraison_click");
    const isDone = !!(S.steps[oid]||{}).livraison?.done;
    if (!isDone) toggleStep(oid, "livraison", false);
  }));
}

// Modal de création d'un nouveau fournisseur.
// Scope volontairement limité : crée uniquement la fiche. L'association
// fournisseur ↔ étapes reste hardcodée dans STEPS (voir toast post-création).
function openNewSupplierModal() {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">
          <span class="modal-title-icon" aria-hidden="true">➕</span>
          <span class="modal-title-text">
            <span>Nouveau fournisseur</span>
            <small>La liste des étapes autorisées reste gérée dans STEPS (code)</small>
          </span>
        </div>
        <button class="modal-close" data-close aria-label="Fermer">×</button>
      </div>
      <div class="modal-body">
        <div>
          <label class="field-label" for="ns-name">Nom *</label>
          <input id="ns-name" class="field-input" type="text" placeholder="Hexa Covers" autocomplete="off" required>
        </div>
        <div>
          <label class="field-label" for="ns-email">Email *</label>
          <input id="ns-email" class="field-input" type="email" placeholder="contact@example.com" autocomplete="off" required>
        </div>
        <div>
          <label class="field-label" for="ns-cc">Cc (optionnel)</label>
          <input id="ns-cc" class="field-input" type="text" placeholder="cc1@example.com, cc2@example.com" autocomplete="off">
        </div>
        <div>
          <label class="field-label" for="ns-contact">Contact (optionnel)</label>
          <input id="ns-contact" class="field-input" type="text" autocomplete="off">
        </div>
        <div>
          <label class="field-label" for="ns-phone">Téléphone (optionnel)</label>
          <input id="ns-phone" class="field-input" type="text" autocomplete="off">
        </div>
        <div>
          <label class="field-label" for="ns-notes">Notes internes (optionnel)</label>
          <textarea id="ns-notes" class="field-textarea" style="min-height:80px;"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" data-close>Annuler</button>
        <button class="btn-modal-send" id="ns-create">Créer</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  document.body.style.overflow = "hidden";
  document.body.style.position = "fixed";
  document.body.style.width = "100%";

  const nameEl    = overlay.querySelector("#ns-name");
  const emailEl   = overlay.querySelector("#ns-email");
  const ccEl      = overlay.querySelector("#ns-cc");
  const contactEl = overlay.querySelector("#ns-contact");
  const phoneEl   = overlay.querySelector("#ns-phone");
  const notesEl   = overlay.querySelector("#ns-notes");
  const createBtn = overlay.querySelector("#ns-create");

  function close() {
    document.body.style.overflow = "";
    document.body.style.position = "";
    document.body.style.width = "";
    overlay.remove();
    document.removeEventListener("keydown", onKey);
  }
  function onKey(e) { if (e.key === "Escape") close(); }
  document.addEventListener("keydown", onKey);

  overlay.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", close));
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });

  setTimeout(() => nameEl.focus(), 50);

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  createBtn.addEventListener("click", async () => {
    const nameVal    = (nameEl.value || "").trim();
    const emailVal   = (emailEl.value || "").trim();
    const ccArr      = (ccEl.value || "").split(",").map(s => s.trim()).filter(Boolean);
    const contactVal = (contactEl.value || "").trim();
    const phoneVal   = (phoneEl.value || "").trim();
    const notesVal   = notesEl.value || "";

    if (!nameVal)  { showToast("⚠ Nom requis"); nameEl.focus(); return; }
    if (!emailVal || !EMAIL_RE.test(emailVal)) { showToast("⚠ Email invalide"); emailEl.focus(); return; }

    const key = supplierNameToKey(nameVal);
    if (!key) { showToast("⚠ Nom invalide"); nameEl.focus(); return; }
    if (S.suppliersByKey[key]) {
      showToast("⚠ Un fournisseur avec ce nom existe déjà");
      nameEl.focus();
      return;
    }

    const payload = {
      name: nameVal,
      key,
      email: emailVal,
      cc: ccArr,
      contact_nom: contactVal,
      phone: phoneVal,
      notes: notesVal,
      delai_livraison_jours: 7,
      mail_mode: "instantané",
      mail_jour: 1,
      mail_heure: "08:00:00",
      template_subject: window.SUPPLIER_TEMPLATES?.defaultSubject || "Commande NOTOX — {date}",
      template_header:  window.SUPPLIER_TEMPLATES?.defaultHeader  || "Bonjour,\n\nVoici notre commande :",
      template_footer:  window.SUPPLIER_TEMPLATES?.defaultFooter  || "Merci,\nNOTOX",
      active: true,
      updated_at: new Date().toISOString(),
    };

    createBtn.disabled = true;
    const prevHtml = createBtn.innerHTML;
    createBtn.innerHTML = `<span class="spinner-xs"></span> Création…`;
    try {
      const { error } = await sb.from("fournisseurs").insert(payload);
      if (error) throw error;
      close();
      await loadFournisseurs();
      render();
      showToast(`✓ Fournisseur ${nameVal} créé`);
      setTimeout(() => {
        showToast(`⚠ Pour que ${nameVal} apparaisse comme option dans une étape, il faut encore modifier STEPS dans index.html`, 5000);
      }, 2800);
    } catch (err) {
      console.error(err);
      showToast("⚠ Création échouée : " + (err.message || err));
      createBtn.disabled = false;
      createBtn.innerHTML = prevHtml;
    }
  });
}

function bindSettings() {
  bindNav();
  document.getElementById("logout-btn")?.addEventListener("click", logout);
  document.getElementById("add-supplier-btn")?.addEventListener("click", openNewSupplierModal);
  document.getElementById("purge-btn")?.addEventListener("click", async()=>{
    if(confirm("Supprimer définitivement toutes les commandes archivées de GaryBot (ainsi que leur panier et historique mails) ?")) await purgeArchived();
  });

  // Délais d'archivage / purge
  const archInput = document.getElementById("setting-archive-days");
  const purgeInput = document.getElementById("setting-purge-days");
  const warnEl = document.getElementById("settings-delay-warning");
  const refreshWarn = () => {
    if (!archInput || !purgeInput || !warnEl) return;
    const a = parseInt(archInput.value) || 0;
    const p = parseInt(purgeInput.value) || 0;
    warnEl.style.display = (a > p) ? "" : "none";
  };
  archInput?.addEventListener("input", refreshWarn);
  purgeInput?.addEventListener("input", refreshWarn);

  document.getElementById("save-delays-btn")?.addEventListener("click", async () => {
    const a = parseInt(archInput?.value);
    const p = parseInt(purgeInput?.value);
    if (!Number.isFinite(a) || a < 1 || a > 365)  { showToast("⚠ Délai d'archivage invalide (1-365 jours)"); return; }
    if (!Number.isFinite(p) || p < 1 || p > 3650) { showToast("⚠ Délai de purge invalide (1-3650 jours)"); return; }
    const btn = document.getElementById("save-delays-btn");
    btn.disabled = true; const prev = btn.textContent; btn.textContent = "…";
    const { error } = await sb.from("app_settings").upsert(
      { id:1, archive_delay_days:a, purge_delay_days:p, updated_at: new Date().toISOString() },
      { onConflict: "id" }
    );
    btn.disabled = false; btn.textContent = prev;
    if (error) { console.error(error); showToast("⚠ Sauvegarde échouée : " + error.message); return; }
    S.settings.archive_delay_days = a;
    S.settings.purge_delay_days   = p;
    showToast("✓ Délais enregistrés");
    // Application immédiate : on relance archivage + purge auto.
    await checkAutoArchive();
    await checkAutoPurge();
    render();
  });
  document.querySelectorAll("[data-settings-unarchive]").forEach(btn=>btn.addEventListener("click", async()=>{
    const oid = parseInt(btn.dataset.settingsUnarchive);
    await unarchiveOrder(oid);
    showToast("↩ Commande désarchivée");
    render();
  }));

  // Toggle dépliage des cartes fournisseurs au clic sur le header
  document.querySelectorAll(".fourn-row.extended .fo-group-head").forEach(head => {
    head.addEventListener("click", e => {
      if (e.target.closest("label")) return;
      const row = head.closest("[data-fo-key]");
      if (!row) return;
      const key = row.dataset.foKey;
      if (S.expandedSupplierKeys.has(key)) S.expandedSupplierKeys.delete(key);
      else S.expandedSupplierKeys.add(key);
      row.classList.toggle("collapsed");
    });
  });

  // Masquer/afficher les champs hebdo selon mail_mode
  document.querySelectorAll('[data-fo-field="mail_mode"]').forEach(sel => sel.addEventListener("change", e => {
    const row = e.target.closest("[data-fo-key]");
    if (!row) return;
    const show = e.target.value === "hebdo";
    row.querySelectorAll("[data-hebdo-only]").forEach(el => { el.style.display = show ? "" : "none"; });
  }));

  // Save par fournisseur
  document.querySelectorAll("[data-save-supplier]").forEach(btn => btn.addEventListener("click", async () => {
    const key = btn.dataset.saveSupplier;
    const row = document.querySelector(`[data-fo-key="${key}"]`);
    if (!row) return;
    const get = field => row.querySelector(`[data-fo-field="${field}"]`);
    const current = S.suppliersByKey[key] || {};
    const ccRaw = (get("cc")?.value || "").split(",").map(s=>s.trim()).filter(Boolean);
    const payload = {
      name: current.name,                      // clé de conflit
      key,
      email: get("email")?.value.trim() || "",
      cc: ccRaw,
      contact_nom: get("contact_nom")?.value.trim() || "",
      phone: get("phone")?.value.trim() || "",
      delai_livraison_jours: parseInt(get("delai_livraison_jours")?.value) || 7,
      mail_mode: get("mail_mode")?.value || "instantané",
      mail_jour: parseInt(get("mail_jour")?.value) || 1,
      mail_heure: get("mail_heure")?.value || "08:00",
      template_subject: get("template_subject")?.value || "",
      template_header:  get("template_header")?.value || "",
      template_footer:  get("template_footer")?.value || "",
      notes: get("notes")?.value || "",
      active: !!get("active")?.checked,
      updated_at: new Date().toISOString(),
    };
    btn.disabled = true; const prevTxt = btn.textContent; btn.textContent = "…";
    const { error } = await sb.from("fournisseurs").upsert(payload, { onConflict: "name" });
    btn.disabled = false; btn.textContent = prevTxt;
    if (error) { console.error(error); showToast("⚠ Sauvegarde échouée : " + error.message); return; }
    // Refresh local state
    Object.assign(S.suppliersByKey[key] || {}, payload);
    if (S.fournisseurs[current.name]) {
      S.fournisseurs[current.name].email = payload.email;
      S.fournisseurs[current.name].phone = payload.phone;
      S.fournisseurs[current.name].contact = payload.contact_nom;
    }
    showToast(`✓ ${current.name} sauvegardé`);
  }));
}

  // Bulle "hint" créée une fois pour toutes
  const hint = document.createElement("div");
  hint.id = "gary-pull-hint";
  hint.textContent = "Tire Gary pour actualiser";
  document.body.appendChild(hint);

  // Étape clé : rendre le logo interactif dès qu'il est rendu par render()
  // On utilise un MutationObserver pour gérer le fait que le logo est recréé
  // à chaque re-render (le header est dans une template string).
  const observer = new MutationObserver(() => {
    const logo = document.querySelector(".gary-logo");
    if (logo && !logo.classList.contains("gpull-active")) {
      logo.classList.add("gpull-active");
      attachHandlers(logo);
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // Au cas où le logo soit déjà dans le DOM au chargement initial
  document.addEventListener("DOMContentLoaded", () => {
    const logo = document.querySelector(".gary-logo");
    if (logo) {
      logo.classList.add("gpull-active");
      attachHandlers(logo);
    }
  });

  function attachHandlers(logo) {
    let startY = 0;
    let pulling = false;
    let armed = false;
    let refreshing = false;

    function setLogoTransform(pull) {
      const p = Math.min(pull, MAX_PULL);
      const progress = p / MAX_PULL;
      const scaleY = 1 + STRETCH_FACTOR * progress;
      const scaleX = 1 - SQUEEZE_FACTOR * progress;
      const tilt = Math.sin(p * 0.08) * 2;
      logo.style.transform = `translateY(${p}px) scale(${scaleX}, ${scaleY}) rotate(${tilt}deg)`;
    }

    function onStart(e) {
      if (refreshing) return;
      const touch = e.touches ? e.touches[0] : e;
      startY = touch.clientY;
      pulling = true;
      armed = false;

      logo.style.transition = "none";
      hint.classList.add("visible");
      hint.textContent = "Tire Gary pour actualiser";

      if (e.cancelable) e.preventDefault();
    }

    function onMove(e) {
      if (!pulling || refreshing) return;
      const touch = e.touches ? e.touches[0] : e;
      const delta = touch.clientY - startY;

      if (delta <= 0) {
        setLogoTransform(0);
        if (armed) {
          armed = false;
          logo.classList.remove("gpull-armed");
        }
        return;
      }

      const pull = Math.min(delta / RESISTANCE, MAX_PULL);
      setLogoTransform(pull);

      const nextArmed = pull >= THRESHOLD;
      if (nextArmed !== armed) {
        armed = nextArmed;
        logo.classList.toggle("gpull-armed", armed);
        hint.textContent = armed ? "Relâche pour actualiser !" : "Tire Gary pour actualiser";
        if (armed && navigator.vibrate) navigator.vibrate(10);
      }

      if (e.cancelable) e.preventDefault();
    }

    function onEnd() {
      if (!pulling || refreshing) return;
      pulling = false;
      hint.classList.remove("visible");

      if (armed) {
        trigger();
      } else {
        // Snap-back mou
        logo.style.transition = "transform 280ms cubic-bezier(0.34, 1.56, 0.64, 1)";
        logo.style.transform = "";
        logo.classList.remove("gpull-armed");
      }
    }

    function trigger() {
      refreshing = true;
      logo.classList.remove("gpull-armed");

      // Squash instantané avant la rotation
      logo.style.transition = "transform 180ms cubic-bezier(0.34, 1.56, 0.64, 1)";
      logo.style.transform = "translateY(0) scale(1.1, 0.85)";

      if (navigator.vibrate) navigator.vibrate([10, 50, 20]);

      setTimeout(() => {
        logo.style.transition = "";
        logo.style.transform = "";
        logo.classList.add("gpull-refreshing");

        setTimeout(() => {
          window.location.reload();
        }, 600);
      }, 180);
    }

    // Mouse (pour tests desktop)
    logo.addEventListener("mousedown", onStart);
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onEnd);

    // Touch (mobile)
    logo.addEventListener("touchstart", onStart, { passive: false });
    document.addEventListener("touchmove", onMove, { passive: false });
    document.addEventListener("touchend", onEnd, { passive: true });
    document.addEventListener("touchcancel", onEnd, { passive: true });
  }
})();
  
</script>
</body>
</html>
