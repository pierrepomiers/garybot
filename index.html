<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GaryBot · NOTOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0a0f1a;
  --bg2:     #111827;
  --bg3:     #1e293b;
  --border:  rgba(255,255,255,0.09);
  --text:    #f1f5f9;
  --muted:   #94a3b8;
  --muted2:  #64748b;
  --accent:  #f59e0b;
  --blue:    #3b82f6;
  --green:   #4ade80;
  --red:     #f87171;
  --orange:  #fb923c;
  --yellow:  #fbbf24;
  --mono:    'Space Mono', monospace;
  --sans:    'DM Sans', sans-serif;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:15px; }
a { color:inherit; text-decoration:none; }
button { cursor:pointer; font-family:var(--sans); }
input,select,textarea { font-family:var(--sans); }

/* ── HEADER ── */
header {
  position:sticky; top:0; z-index:100;
  background:linear-gradient(to bottom, rgba(10,15,26,0.96) 0%, rgba(10,15,26,0) 100%);
  padding:12px 14px 28px 110px;
  display:flex; align-items:flex-start; justify-content:flex-end; gap:12px;
  overflow:visible; border:none;
}
.gary-logo {
  position:fixed; top:0; left:0;
  height:128px; width:auto; z-index:101; pointer-events:none;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
}
.menu-wrap { position:relative; }
.hamburger-btn {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  width:42px; height:42px; border-radius:10px; padding:0;
  display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; transition:all .15s;
}
.hamburger-btn:hover { border-color:rgba(245,158,11,.35); }
.hamburger-btn[aria-expanded="true"] {
  background:rgba(245,158,11,.15); border-color:rgba(245,158,11,.45); color:var(--accent);
}
.hamburger-btn span {
  display:block; width:20px; height:2px; background:currentColor; border-radius:2px;
}
.main-menu {
  position:absolute; top:calc(100% + 8px); right:0;
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:6px; min-width:220px; z-index:200;
  box-shadow:0 12px 32px rgba(0,0,0,.5);
}
.menu-header {
  padding:10px 12px; margin-bottom:4px;
  border-bottom:1px solid var(--border);
  font-family:var(--mono); font-size:12px; color:var(--muted);
  letter-spacing:.06em; text-transform:lowercase; word-break:break-all;
}
.menu-item {
  width:100%; background:none; border:none; color:var(--text);
  padding:11px 12px; border-radius:8px; font-size:14px; font-family:var(--mono);
  text-align:left; display:flex; align-items:center; gap:10px;
}
.menu-item:hover { background:rgba(245,158,11,.1); }
.menu-item.active { background:rgba(245,158,11,.15); color:var(--accent); }
.menu-item.danger:hover { background:rgba(239,68,68,.12); color:var(--red); }
.menu-item:disabled { opacity:.4; cursor:not-allowed; }
.menu-divider { height:1px; background:var(--border); margin:4px 6px; }

/* ── STATS ── */
.stats-bar {
  display:grid; grid-template-columns:repeat(4, 1fr); gap:6px;
  padding:10px 10px; border-bottom:1px solid var(--border); background:var(--bg2);
}
.stat-chip {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:8px 4px; font-family:var(--mono); color:var(--text); min-width:0;
}
.stat-num { font-weight:700; font-size:20px; line-height:1.1; }
.stat-label { font-size:10px; color:var(--muted); letter-spacing:.04em; text-transform:lowercase; white-space:nowrap; }

/* ── TOOLBAR ── */
.toolbar { padding:12px 14px; display:flex; gap:8px; background:var(--bg2); border-bottom:1px solid var(--border); }
.search-input { flex:1; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; outline:none; }
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:rgba(59,130,246,.4); }
.filter-select { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:10px 10px; border-radius:8px; font-size:13px; outline:none; min-width:96px; }

/* ── ORDERS ── */
.orders-container { padding:14px 12px 24px; display:flex; flex-direction:column; gap:12px; }

/* ── ORDER CARD ── */
.order-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color .2s; }
.order-card.urgent { border-color:rgba(239,68,68,.35); }
.order-card.complete { border-color:rgba(74,222,128,.25); }
.order-card.in-progress { border-color:rgba(245,158,11,.2); }

.card-header { padding:14px 16px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; cursor:pointer; user-select:none; }
.card-ref-row {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  font-family:var(--mono); line-height:1.1;
}
.card-ref {
  font-size:13px; color:var(--accent); font-weight:700; letter-spacing:.04em;
  text-decoration:none; border-bottom:1px dashed rgba(245,158,11,.4);
}
.card-ref:hover { color:#fcd34d; border-bottom-color:rgba(245,158,11,.8); }
.card-ref-meta { font-size:12px; color:var(--muted); font-weight:400; letter-spacing:.02em; }
.card-client { font-size:17px; font-weight:600; margin-top:6px; color:var(--text); }
.card-meta { font-size:13px; color:var(--muted); font-family:var(--mono); margin-top:6px; display:flex; gap:10px; flex-wrap:wrap; }
.urgent-badge { background:rgba(239,68,68,.18); color:var(--red); border:1px solid rgba(239,68,68,.35); padding:2px 7px; border-radius:99px; font-size:11px; font-family:var(--mono); }
.card-right { display:flex; flex-direction:row; align-items:center; gap:8px; flex-shrink:0; }
.progress-badge { font-family:var(--mono); font-size:14px; font-weight:700; padding:4px 10px; border-radius:99px; }
.p0   { background:rgba(248,113,113,.15); color:var(--red); }
.p25  { background:rgba(248,113,113,.15); color:var(--red); }
.p50  { background:rgba(251,146,60,.18);  color:var(--orange); }
.p75  { background:rgba(251,191,36,.18);  color:var(--yellow); }
.p100 { background:rgba(74,222,128,.18);  color:var(--green); }
.expand-icon { font-size:11px; color:var(--muted); transition:transform .2s; }
.expand-icon.open { transform:rotate(180deg); }

.progress-bar-thin { height:6px; background:var(--bg3); border-radius:99px; overflow:hidden; margin:0 16px 12px; }
.progress-fill { height:100%; border-radius:99px; transition:width .4s ease, background .3s ease; }

/* ── CARD BODY ── */
.card-body { padding:0 12px 12px; display:flex; flex-direction:column; gap:6px; }

.lines-summary { margin:0 12px 10px; background:rgba(255,255,255,.03); border-radius:8px; padding:10px 12px; border:1px solid var(--border); }
.lines-title { font-size:11px; color:var(--muted); font-family:var(--mono); margin-bottom:6px; letter-spacing:.08em; font-weight:700; }
.line-item { font-size:13px; color:#cbd5e1; padding:3px 0; }
.line-item strong { color:var(--text); }

/* ── META EDIT ROW ── */
.meta-row { margin:0 12px 10px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.meta-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:6px; font-size:13px; outline:none; }
.meta-input:focus { border-color:rgba(245,158,11,.4); }
.meta-label { font-size:11px; color:var(--muted); font-family:var(--mono); font-weight:700; }
.priority-btn { font-size:12px; padding:5px 10px; border-radius:99px; border:1px solid rgba(255,255,255,.15); background:transparent; color:var(--muted); font-family:var(--mono); }
.priority-btn.urgent { background:rgba(239,68,68,.18); color:var(--red); border-color:rgba(239,68,68,.35); }
.priority-btn.normal { background:rgba(74,222,128,.12); color:var(--green); border-color:rgba(74,222,128,.28); }

/* ── STEP ROW ── */
.step-row { display:flex; flex-direction:column; gap:5px; padding:10px 12px; border-radius:8px; background:rgba(255,255,255,.03); border:1px solid transparent; transition:all .2s; }
.step-row.done { background:rgba(74,222,128,.07); border-color:rgba(74,222,128,.2); }
.step-row-top { display:flex; align-items:center; gap:8px; }
.step-check { background:none; border:none; font-size:22px; line-height:1; padding:0; flex-shrink:0; transition:transform .15s; }
.step-check:active { transform:scale(.85); }
.step-label { font-family:var(--mono); font-size:13px; letter-spacing:.03em; flex:1; font-weight:500; }
.step-row.done .step-label { color:var(--green); }
.step-row:not(.done) .step-label { color:#cbd5e1; }

.mail-btn { font-size:12px; padding:5px 10px; border-radius:99px; border:1px solid; font-family:var(--mono); text-decoration:none; display:inline-flex; align-items:center; gap:4px; flex-shrink:0; }
.mail-client  { background:rgba(59,130,246,.12); color:#bfdbfe;    border-color:rgba(59,130,246,.3); }
.mail-fourn   { background:rgba(245,158,11,.12); color:#fcd34d;    border-color:rgba(245,158,11,.3); }
.mail-sent    { background:rgba(74,222,128,.12); color:var(--green); border-color:rgba(74,222,128,.3); }
.mail-relance { background:rgba(239,68,68,.12);  color:var(--red); border-color:rgba(239,68,68,.3); }

.step-fourn-row { padding-left:34px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.fourn-chip { font-size:12px; padding:4px 10px; border-radius:99px; border:1px solid rgba(255,255,255,.15); background:transparent; color:var(--muted); font-family:var(--mono); }
.fourn-chip.selected { background:rgba(245,158,11,.18); color:#fcd34d; border-color:rgba(245,158,11,.45); }
.no-email-warn { font-size:11px; color:var(--red); font-family:var(--mono); }

.livraison-info { padding-left:34px; font-size:13px; color:var(--muted); display:flex; flex-direction:column; gap:4px; }
.livraison-info .addr { color:var(--text); font-weight:500; }
.livraison-toggle { display:flex; gap:6px; margin-bottom:5px; }
.type-btn { font-size:12px; padding:4px 10px; border-radius:99px; border:1px solid rgba(255,255,255,.15); background:transparent; color:var(--muted); font-family:var(--mono); }
.type-btn.active { background:rgba(163,230,53,.18); color:#a3e635; border-color:rgba(163,230,53,.35); }

/* ── ARCHIVE BANNER ── */
.archive-banner {
  margin:0 12px 10px; padding:10px 14px; border-radius:8px;
  background:rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.25);
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
}
.archive-banner-text { font-size:13px; color:var(--green); font-family:var(--mono); }
.archive-confirm-btn {
  font-size:12px; padding:5px 12px; border-radius:99px;
  background:rgba(74,222,128,.18); border:1px solid rgba(74,222,128,.35);
  color:var(--green); font-family:var(--mono);
}
.archive-cancel-btn {
  font-size:12px; padding:5px 12px; border-radius:99px;
  background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.25);
  color:var(--red); font-family:var(--mono);
}

/* ── LOGIN ── */
#login-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
.login-box { width:100%; max-width:360px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:32px 24px; }
.login-logo { font-family:var(--mono); font-size:24px; color:var(--accent); font-weight:700; letter-spacing:.1em; margin-bottom:6px; }
.login-sub { font-size:14px; color:var(--muted); margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:12px; color:var(--muted); font-family:var(--mono); letter-spacing:.06em; margin-bottom:6px; display:block; font-weight:700; }
.form-input { width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:11px 12px; border-radius:8px; font-size:15px; outline:none; transition:border-color .2s; }
.form-input::placeholder { color:var(--muted2); }
.form-input:focus { border-color:rgba(245,158,11,.4); }
.btn-primary { width:100%; background:var(--accent); color:#000; padding:12px; border:none; border-radius:8px; font-size:15px; font-weight:600; margin-top:8px; }
.btn-primary:disabled { opacity:.4; }
.error-msg { font-size:13px; color:var(--red); margin-top:8px; text-align:center; font-family:var(--mono); }

/* ── SETTINGS ── */
#settings-screen { flex:1; padding:18px; max-width:600px; margin:0 auto; width:100%; }
.settings-title { font-family:var(--mono); font-size:16px; color:var(--accent); margin-bottom:18px; letter-spacing:.06em; font-weight:700; }
.settings-section { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:14px; }
.section-title { font-size:12px; color:var(--muted); font-family:var(--mono); letter-spacing:.08em; margin-bottom:14px; font-weight:700; }
.fourn-row {
  display:flex; flex-direction:column; gap:8px;
  margin-bottom:12px; padding:12px;
  border-radius:10px; background:rgba(255,255,255,.03);
  border:1px solid var(--border);
}
.fourn-name { font-family:var(--mono); font-size:14px; color:var(--accent); font-weight:700; letter-spacing:.04em; }
.fourn-row .form-input { width:100%; font-size:14px; padding:10px 12px; }
@media (min-width:600px) {
  .fourn-row { flex-direction:row; align-items:center; flex-wrap:wrap; gap:10px; }
  .fourn-name { min-width:90px; flex-shrink:0; }
  .fourn-row .form-input { flex:1; min-width:140px; width:auto; }
}
.btn-save { background:rgba(245,158,11,.18); border:1px solid rgba(245,158,11,.35); color:#fcd34d; padding:10px 18px; border-radius:8px; font-size:14px; font-family:var(--mono); margin-top:10px; }
.btn-danger { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.25); color:var(--red); padding:10px 18px; border-radius:8px; font-size:14px; font-family:var(--mono); }
.btn-logout { background:rgba(100,116,139,.12); border:1px solid rgba(100,116,139,.25); color:var(--text); padding:10px 18px; border-radius:8px; font-size:14px; font-family:var(--mono); }
.purge-info { font-size:13px; color:var(--muted); margin-bottom:12px; line-height:1.5; }

/* ── TOAST ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:12px 20px; border-radius:99px; font-size:14px; font-family:var(--mono); z-index:999; animation:fadeUp .3s ease, fadeOut .3s ease 2.2s forwards; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.35); }
@keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes fadeOut { to{opacity:0} }

/* ── LOADING ── */
.loading { text-align:center; padding:48px 16px; color:var(--muted); font-family:var(--mono); font-size:14px; }
.spinner { display:inline-block; width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
@keyframes spin { to{transform:rotate(360deg)} }
.empty-state { text-align:center; padding:64px 24px; color:var(--muted); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty-text { font-family:var(--mono); font-size:14px; }
</style>
</head>
<body>
<div id="app" style="min-height:100vh;display:flex;flex-direction:column;"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// ⚠️  CONFIG — REMPLACER CES 4 VALEURS AVANT DE DÉPLOYER
// ══════════════════════════════════════════════════════════════════════════════
const CONFIG = {
  supabaseUrl:  "https://omaszhtehrhpfwxqypxw.supabase.co",
  supabaseKey:  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tYXN6aHRlaHJocGZ3eHF5cHh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjI1MDMsImV4cCI6MjA5MTgzODUwM30.Ze3QjjpgqRBEeJ-Q_2qpdq3EW2s8YIH0w1G2NotJx2Q",				// Supabase API key anon public
  backendUrl:   "https://garybot-api.onrender.com",	// Render web service URR
  apiSecret:    "notox2026",				// même valeur que Render env var API_SECRET
  odooWebUrl:   "https://notoxsurf.odoo.com",		// URL de base de l'instance Odoo (lien clickable depuis la ref commande)
};

// Délai avant archivage automatique après livraison cochée (en jours)
const ARCHIVE_DELAY_DAYS = 15;
const PURGE_DELAY_DAYS = 30;

// ══════════════════════════════════════════════════════════════════════════════
// ÉTAPES
// ══════════════════════════════════════════════════════════════════════════════
const STEPS = [
  { id:"appro_blank",  label:"Appro. Blank",  fourn:["Viral","Atua","Ben"],         clientMail:false },
  { id:"cmd_preshape", label:"Cmd. Preshape", fourn:["Viral","Atua","Ben"],         clientMail:false },
  { id:"cmd_access",   label:"Cmd. Access.",  fourn:["Viral","FCS","Surf System"],  clientMail:false },
  { id:"shape",        label:"Shape",         fourn:null, clientMail:true  },
  { id:"deco",         label:"Déco",          fourn:null, clientMail:true  },
  { id:"strat",        label:"Strat",         fourn:null, clientMail:true  },
  { id:"pose_plugs",   label:"Pose Plugs",    fourn:null, clientMail:false },
  { id:"poncage",      label:"Ponçage",       fourn:null, clientMail:true  },
  { id:"finition",     label:"Finition",      fourn:null, clientMail:true  },
  { id:"emballage",    label:"Emballage",     fourn:null, clientMail:true  },
  { id:"livraison",    label:"Livraison",     fourn:null, clientMail:true, isLivraison:true },
];

// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let sb = null;
let S = {
  view:"login", user:null,
  orders:[], steps:{}, meta:{}, fournisseurs:{},
  expanded:new Set(),
  search:"", filter:"all",
  loading:false, syncing:false,
  loginEmail:"", loginPass:"", loginError:"",
  archivePending: new Set(), // order_ids en attente de confirmation archivage
  userMenuOpen: false,
};

// ══════════════════════════════════════════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════════════════════════════════════════
function initSB() { sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey); }

async function sbGet(table, eq) {
  let q = sb.from(table).select("*");
  if (eq) q = q.eq(eq[0], eq[1]);
  const { data, error } = await q;
  if (error) throw error;
  return data || [];
}

// ══════════════════════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════════════════════
async function login(email, pass) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) throw error;
  return data.user;
}
async function logout() {
  await sb.auth.signOut();
  S.user = null; S.view = "login"; render();
}
async function checkSession() {
  const { data } = await sb.auth.getSession();
  if (data.session?.user) { S.user = data.session.user; S.view = "orders"; await loadAll(); }
}

// ══════════════════════════════════════════════════════════════════════════════
// CHARGEMENT
// ══════════════════════════════════════════════════════════════════════════════
async function loadAll() {
  S.loading = true; render();
  await Promise.all([loadFournisseurs(), loadStepsAndMeta(), syncOdoo()]);
  S.loading = false; render();
}

async function loadFournisseurs() {
  const data = await sbGet("fournisseurs");
  S.fournisseurs = {};
  data.forEach(f => S.fournisseurs[f.name] = { email:f.email||"", phone:f.phone||"", contact:f.contact_nom||"", id:f.id });
}

async function loadStepsAndMeta() {
  const [stepsData, metaData] = await Promise.all([sbGet("order_steps"), sbGet("order_meta")]);
  S.steps = {};
  stepsData.forEach(s => {
    if (!S.steps[s.order_id]) S.steps[s.order_id] = {};
    S.steps[s.order_id][s.step_id] = { done:s.done, fournisseur:s.fournisseur, mail_sent:s.mail_sent, mail_relance:s.mail_relance };
  });
  S.meta = {};
  metaData.forEach(m => { S.meta[m.order_id] = { delivery_type:m.delivery_type, priority:m.priority, shaper:m.shaper, model:m.model, dimensions:m.dimensions, due_date:m.due_date, archived:m.archived, archived_at:m.archived_at }; });
}

async function syncOdoo() {
  S.syncing = true; render();
  try {
    const resp = await fetch(`${CONFIG.backendUrl}/orders`, { headers:{ "x-api-secret":CONFIG.apiSecret } });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    S.orders = data.orders || [];
    // Upsert meta pour nouvelles commandes
    for (const o of S.orders) {
      if (!S.meta[o.id]) {
        await sb.from("order_meta").upsert({ order_id:o.id, order_name:o.name, delivery_type:"livraison", priority:"normal" }, { onConflict:"order_id" });
        S.meta[o.id] = { delivery_type:"livraison", priority:"normal", archived:false };
      }
    }
    // Vérifier archivages et purges automatiques
    await checkAutoArchive();
    await checkAutoPurge();
  } catch(e) {
    console.error(e);
    showToast("⚠ Erreur sync Odoo : " + e.message);
  }
  S.syncing = false;
}

// ══════════════════════════════════════════════════════════════════════════════
// ARCHIVAGE AUTOMATIQUE
// Déclenché quand livraison est cochée. Archivage effectif après ARCHIVE_DELAY_DAYS.
// ══════════════════════════════════════════════════════════════════════════════
async function checkAutoArchive() {
  for (const o of S.orders) {
    const meta = S.meta[o.id];
    if (!meta || meta.archived) continue;
    const livraisonStep = (S.steps[o.id] || {})["livraison"];
    if (!livraisonStep?.done) continue;

    // Récupérer la date de cochage depuis Supabase
    const { data } = await sb.from("order_steps")
      .select("done_at").eq("order_id", o.id).eq("step_id", "livraison").single();
    if (!data?.done_at) continue;

    const doneAt = new Date(data.done_at);
    const diffDays = (Date.now() - doneAt.getTime()) / (1000 * 60 * 60 * 24);
    if (diffDays >= ARCHIVE_DELAY_DAYS) {
      // Archivage automatique
      await archiveOrder(o.id, true);
    } else {
      // En attente — afficher la bannière de confirmation
      S.archivePending.add(o.id);
    }
  }
}

async function archiveOrder(orderId, auto = false) {
  const now = new Date().toISOString();
  S.meta[orderId] = { ...(S.meta[orderId] || {}), archived:true, archived_at:now };
  S.archivePending.delete(orderId);
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_meta").upsert({ order_id:orderId, order_name:order?.name||"", archived:true, archived_at:now }, { onConflict:"order_id" });
  await logHistory(orderId, order?.name||"", null, "archived", auto ? "auto" : "manuel", "");
  showToast(`📦 ${order?.name || "Commande"} archivée`);
  render();
}

async function unarchiveOrder(orderId) {
  S.meta[orderId] = { ...(S.meta[orderId] || {}), archived:false };
  S.archivePending.delete(orderId);
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_meta").upsert({ order_id:orderId, order_name:order?.name||"", archived:false }, { onConflict:"order_id" });
  render();
}

async function checkAutoPurge() {
  const toPurge = [];
  for (const [oid, meta] of Object.entries(S.meta)) {
    if (!meta.archived || !meta.archived_at) continue;
    const archivedAt = new Date(meta.archived_at);
    const diffDays = (Date.now() - archivedAt.getTime()) / (1000 * 60 * 60 * 24);
    if (diffDays >= PURGE_DELAY_DAYS) toPurge.push(parseInt(oid));
  }
  if (!toPurge.length) return;
  for (const id of toPurge) {
    await sb.from("order_steps").delete().eq("order_id", id);
    await sb.from("order_meta").delete().eq("order_id", id);
    delete S.meta[id];
    delete S.steps[id];
  }
  S.orders = S.orders.filter(o => !toPurge.includes(o.id));
  console.log(`Auto-purge: ${toPurge.length} commande(s) supprimée(s)`);
}

async function purgeArchived() {
  const archivedIds = Object.entries(S.meta).filter(([,v]) => v.archived).map(([k]) => parseInt(k));
  if (!archivedIds.length) { showToast("Rien à purger"); return; }
  for (const id of archivedIds) {
    await sb.from("order_steps").delete().eq("order_id", id);
    await sb.from("order_meta").delete().eq("order_id", id);
  }
  await loadStepsAndMeta();
  S.orders = S.orders.filter(o => !archivedIds.includes(o.id));
  showToast(`🗑 ${archivedIds.length} commande(s) purgée(s)`);
  render();
}

// ══════════════════════════════════════════════════════════════════════════════
// ACTIONS ÉTAPES
// ══════════════════════════════════════════════════════════════════════════════
async function toggleStep(orderId, stepId, currentDone) {
  const newDone = !currentDone;
  if (!S.steps[orderId]) S.steps[orderId] = {};
  S.steps[orderId][stepId] = { ...(S.steps[orderId][stepId]||{}), done:newDone };
  render();
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_steps").upsert({
    order_id:orderId, order_name:order?.name||"", step_id:stepId,
    done:newDone, fournisseur:S.steps[orderId][stepId]?.fournisseur||null,
    mail_sent:S.steps[orderId][stepId]?.mail_sent||false,
    mail_relance:S.steps[orderId][stepId]?.mail_relance||false,
    updated_by:S.user.id,
  }, { onConflict:"order_id,step_id" });
  await logHistory(orderId, order?.name||"", stepId, newDone?"step_done":"step_undone", "", S.user.email||"");
  // Si livraison cochée → préparer archivage
  if (stepId === "livraison" && newDone) {
    S.archivePending.add(orderId);
    render();
  }
  if (stepId === "livraison" && !newDone) {
    S.archivePending.delete(orderId);
    render();
  }
}

async function setFournisseur(orderId, stepId, fourn) {
  if (!S.steps[orderId]) S.steps[orderId] = {};
  S.steps[orderId][stepId] = { ...(S.steps[orderId][stepId]||{}), fournisseur:fourn };
  render();
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_steps").upsert({
    order_id:orderId, order_name:order?.name||"", step_id:stepId,
    done:S.steps[orderId][stepId]?.done||false, fournisseur:fourn,
    mail_sent:S.steps[orderId][stepId]?.mail_sent||false,
    mail_relance:S.steps[orderId][stepId]?.mail_relance||false,
    updated_by:S.user.id,
  }, { onConflict:"order_id,step_id" });
}

async function markMailSent(orderId, stepId, isRelance) {
  if (!S.steps[orderId]) S.steps[orderId] = {};
  const cur = S.steps[orderId][stepId] || {};
  S.steps[orderId][stepId] = { ...cur, mail_sent:true, mail_relance:isRelance||cur.mail_relance };

  }, { onConflict:"order_id,step_id" });

async function setDeliveryType(orderId, type) {

async function setMeta(orderId, field, value) {

// ══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function getProgress(orderId) {
  const steps = S.steps[orderId] || {};
  return Math.round(STEPS.filter(s => steps[s.id]?.done).length / STEPS.length * 100);
}
function pClass(p) { return p===100?"p100":p>=61?"p75":p>=31?"p50":"p25"; }
function pColor(p) { return p===100?"#4ade80":p>=61?"#fbbf24":p>=31?"#fb923c":"#f87171"; }
function fmtDate(s) { return s ? new Date(s).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"}) : ""; }
function fmtAmount(n) { return n ? new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n) : ""; }
function buildAddr(p) { if(!p) return ""; return [p.street,p.zip,p.city,p.country_id?.[1]].filter(Boolean).join(", "); }

function buildMailtoFourn(email, fourn, order, stepLabel, isRelance) {
  const ref = order.name||""; const client = order.partner_detail?.name||"";
  const lines = (order.lines_detail||[]).map(l=>`  - ${l.product_id?.[1]||l.name} x${l.product_uom_qty}`).join("\n");
  const subj = isRelance ? `RELANCE – Commande NOTOX ${ref} / ${stepLabel}` : `Commande NOTOX ${ref} – ${stepLabel}`;
  const body = isRelance
    ? `Bonjour ${fourn},\n\nNous revenons vers vous concernant notre commande NOTOX ${ref} (${stepLabel}) pour le client ${client}.\n\nMerci de nous confirmer la disponibilité et le délai.\n\nCordialement,\nÉquipe NOTOX / GREEN WAVE`
    : `Bonjour ${fourn},\n\nVeuillez trouver ci-dessous notre commande ${ref} pour le client ${client}.\n\nDétail :\n${lines||"  (voir commande jointe)"}\n\nMerci de confirmer réception et délai.\n\nCordialement,\nÉquipe NOTOX / GREEN WAVE\nwww.notox.fr`;
  return `mailto:${email}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
}

function buildMailtoClient(order, stepLabel, progress) {
  const email = order.partner_detail?.email||""; const name = order.partner_detail?.name||""; const ref = order.name||"";
  const subj = `Votre commande NOTOX ${ref} – Avancement ${progress}%`;
  const body = progress===100
    ? `Bonjour ${name},\n\nVotre commande NOTOX ${ref} est prête !\nNous vous contacterons pour organiser la livraison ou le retrait.\n\nCordialement,\nÉquipe NOTOX / GREEN WAVE\nwww.notox.fr`
    : `Bonjour ${name},\n\nÉtat d'avancement de votre commande NOTOX ${ref} :\n\nÉtape en cours : ${stepLabel}\nProgression : ${progress}%\n\nNous vous tiendrons informé(e) de la suite.\n\nCordialement,\nÉquipe NOTOX / GREEN WAVE\nwww.notox.fr`;
  return `mailto:${email}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
}

function showToast(msg) {
  const t = document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2700);
}

function filteredOrders() {
  let orders = S.orders.filter(o => !S.meta[o.id]?.archived);
  if (S.search) { const q=S.search.toLowerCase(); orders=orders.filter(o=>(o.name||"").toLowerCase().includes(q)||(o.partner_detail?.name||"").toLowerCase().includes(q)); }
  if (S.filter==="pending") orders=orders.filter(o=>getProgress(o.id)<100);
  if (S.filter==="done")    orders=orders.filter(o=>getProgress(o.id)===100);
  if (S.filter==="urgent")  orders=orders.filter(o=>S.meta[o.id]?.priority==="urgent");
  // Trier : urgent en premier, puis par date
  orders.sort((a,b) => {
    const ap = S.meta[a.id]?.priority==="urgent" ? 0:1;
    const bp = S.meta[b.id]?.priority==="urgent" ? 0:1;
    if (ap!==bp) return ap-bp;
    return new Date(b.date_order||0) - new Date(a.date_order||0);
  });
  return orders;
}

  const part  = order.partner_detail || {};

          <span class="card-ref-meta">${fmtDate(order.date_order)} · ${fmtAmount(order.amount_total)}</span>
          ${isUrgent?'<span class="urgent-badge">URGENT</span>':""}
        </div>
        <div class="card-client">${part.name||"—"}</div>
        ${extraMeta ? `<div class="card-meta">
          ${meta.due_date?`<span style="color:var(--accent)">📅 ${fmtDate(meta.due_date)}</span>`:""}
          ${meta.shaper?`<span>✂ ${meta.shaper}</span>`:""}
        </div>` : ""}
      </div>
      <div class="card-right">
        <div class="progress-badge ${pClass(prog)}">${prog}%</div>
        <div class="expand-icon${isExp?" open":""}" aria-hidden="true">▼</div>
      </div>
    </div>
    <div class="progress-bar-thin"><div class="progress-fill" style="width:${prog}%;background:${pColor(prog)}"></div></div>
    ${isExp?`
      ${archiveBanner}
      ${metaRow}
      <div class="lines-summary">
        <div class="lines-title">CONTENU COMMANDE</div>
        ${linesHtml||'<div class="line-item">—</div>'}
      </div>
      <div class="card-body">${stepsHtml}</div>
    `:""}
  </div>`;
}

// ── SETTINGS ──
function renderSettings() {
  const archivedOrders = S.orders.filter(o=>S.meta[o.id]?.archived);
  const archivedCount = archivedOrders.length;
  const foRows = Object.entries(S.fournisseurs).map(([name,val])=>`
    <div class="fourn-row">
      <span class="fourn-name">${name}</span>
      <input class="form-input" id="fo-email-${name}" type="email" placeholder="email" value="${val.email||""}">
      <input class="form-input" id="fo-contact-${name}" placeholder="contact" value="${val.contact||""}">
    </div>`).join("");

  return `<div id="settings-screen">
    <div class="settings-title">⚙ CONFIGURATION</div>
    <div class="settings-section">
      <div class="section-title">FOURNISSEURS</div>
      ${foRows}
      <button class="btn-save" id="save-fourn-btn">Sauvegarder</button>
    </div>
    <div class="settings-section">
      <div class="section-title">ARCHIVAGE</div>
      <div class="purge-info">Les commandes sont archivées automatiquement ${ARCHIVE_DELAY_DAYS} jours après la livraison cochée, puis purgées automatiquement ${PURGE_DELAY_DAYS} jours après archivage. La purge les supprime définitivement de GaryBot (elles restent dans Odoo).</div>
      ${archivedCount>0
        ? `<div style="font-size:13px;color:var(--muted);margin-bottom:10px;">${archivedCount} commande(s) archivée(s) en attente de purge.</div>
           <button class="btn-danger" id="purge-btn">🗑 Purger les archivées (${archivedCount})</button>`
        : `<div style="font-size:13px;color:var(--muted);">Aucune commande archivée.</div>`
      }
    </div>
    <div class="settings-section">
      <div class="section-title">COMMANDES ARCHIVÉES</div>
      ${archivedOrders.length===0
        ? `<div style="font-size:13px;color:var(--muted);">Aucune commande archivée.</div>`
        : archivedOrders.map(o => {
            const p = o.partner_detail || {};
            const prog = getProgress(o.id);
            const archAt = S.meta[o.id]?.archived_at;
            return `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid var(--border);margin-bottom:6px;">
              <div style="flex:1;min-width:0;">
                <div style="font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700;">${o.name||"—"}</div>
                <div style="font-size:13px;color:var(--text);margin-top:1px;">${p.name||"—"}</div>
                <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;">${fmtAmount(o.amount_total)} · ${fmtDate(o.date_order)}${archAt ? ` · archivée ${fmtDate(archAt)}` : ""}</div>
              </div>
              <button class="btn-save" data-settings-unarchive="${o.id}" style="margin:0;padding:5px 12px;font-size:11px;white-space:nowrap;">↩ Désarchiver</button>
            </div>`;
          }).join("")
      }
    </div>
    <div class="settings-section">
      <div class="section-title">SESSION</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">Connecté : ${S.user?.email}</div>
      <button class="btn-logout" id="logout-btn">Se déconnecter</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// BIND
// ══════════════════════════════════════════════════════════════════════════════
window._mailSent = (oid, stepId, isRelance) => setTimeout(()=>markMailSent(oid,stepId,isRelance), 300);

function bindLogin() {
  const btn=document.getElementById("l-btn"), emailEl=document.getElementById("l-email"), passEl=document.getElementById("l-pass");
  const doLogin = async () => {
    btn.disabled=true; btn.textContent="..."; S.loginError="";
    try { S.user=await login(emailEl.value, passEl.value); S.loginEmail=emailEl.value; S.view="orders"; await loadAll(); }
    catch(e) { S.loginError=e.message||"Erreur"; btn.disabled=false; btn.textContent="Connexion"; render(); }
  };
  btn.addEventListener("click", doLogin);
  passEl.addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
}

function bindNav() {
  document.getElementById("nav-orders")?.addEventListener("click", ()=>{ S.view="orders"; S.userMenuOpen=false; render(); });
  document.getElementById("nav-settings")?.addEventListener("click", ()=>{ S.view="settings"; S.userMenuOpen=false; render(); });
  document.getElementById("nav-logout")?.addEventListener("click", (e)=>{ e.stopPropagation(); S.userMenuOpen=false; logout(); });
  document.getElementById("sync-btn")?.addEventListener("click", async()=>{
    S.userMenuOpen=false; render();
    await syncOdoo(); render();
  });
  document.getElementById("menu-toggle")?.addEventListener("click", (e)=>{
    e.stopPropagation();
    S.userMenuOpen = !S.userMenuOpen;
    render();
  });
}

function bindOrders() {
  bindNav();
  document.getElementById("search-input")?.addEventListener("input", e=>{ S.search=e.target.value; render(); });
  document.getElementById("filter-select")?.addEventListener("change", e=>{ S.filter=e.target.value; render(); });

  document.querySelectorAll("[data-toggle]").forEach(el=>el.addEventListener("click", (e)=>{
    if (e.target.closest("[data-stop-toggle]")) return;
    const oid=parseInt(el.dataset.toggle);
    S.expanded.has(oid)?S.expanded.delete(oid):S.expanded.add(oid); render();
  }));
  document.querySelectorAll(".step-check").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation();
    const oid=parseInt(btn.dataset.oid), stepId=btn.dataset.step;
    toggleStep(oid, stepId, (S.steps[oid]||{})[stepId]?.done||false);
  }));
  document.querySelectorAll(".fourn-chip").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation(); setFournisseur(parseInt(btn.dataset.oid), btn.dataset.step, btn.dataset.fourn);
  }));
  document.querySelectorAll("[data-type]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation(); setDeliveryType(parseInt(btn.dataset.oid), btn.dataset.type);
  }));
  document.querySelectorAll("[data-priority]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation();
    const oid=parseInt(btn.dataset.priority);
    const cur = S.meta[oid]?.priority||"normal";
    setMeta(oid, "priority", cur==="urgent"?"normal":"urgent").then(()=>render());
  }));
  document.querySelectorAll("[data-meta-field]").forEach(input=>input.addEventListener("blur", ()=>{
    setMeta(parseInt(input.dataset.oid), input.dataset.metaField, input.value);
  }));
  document.querySelectorAll("[data-archive]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation(); archiveOrder(parseInt(btn.dataset.archive));
  }));
  document.querySelectorAll("[data-unarchive]").forEach(btn=>btn.addEventListener("click", e=>{
    e.stopPropagation(); unarchiveOrder(parseInt(btn.dataset.unarchive));
  }));
}

function bindSettings() {
  bindNav();
  document.getElementById("logout-btn")?.addEventListener("click", logout);
  document.getElementById("purge-btn")?.addEventListener("click", async()=>{
    if(confirm("Supprimer définitivement toutes les commandes archivées de GaryBot ?")) await purgeArchived();
  });
  document.querySelectorAll("[data-settings-unarchive]").forEach(btn=>btn.addEventListener("click", async()=>{
    const oid = parseInt(btn.dataset.settingsUnarchive);
    await unarchiveOrder(oid);
    showToast("↩ Commande désarchivée");
    render();
  }));
  document.getElementById("save-fourn-btn")?.addEventListener("click", async()=>{
    const newF={};
    for(const name of Object.keys(S.fournisseurs)) {
      newF[name]={ email:document.getElementById(`fo-email-${name}`)?.value||"", phone:S.fournisseurs[name].phone||"", contact:document.getElementById(`fo-contact-${name}`)?.value||"" };
    }
    await saveFournisseurs(newF);
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener("click", (e) => {
  if (S.userMenuOpen && !e.target.closest(".menu-wrap")) {
    S.userMenuOpen = false;
    render();
  }
});

async function boot() { initSB(); render(); await checkSession(); render(); }
boot();
</script>
</body>
</html>
