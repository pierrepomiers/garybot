<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GaryBot · NOTOX</title>
<link rel="icon" type="image/png" href="garybot_logo.png">
<link rel="apple-touch-icon" href="garybot_logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="messages.js?v=1776776084"></script>
<script src="supplier_templates.js?v=1776776084"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0a0f1a;
  --bg2:     #111827;
  --bg3:     #1e293b;
  --border:  rgba(255,255,255,0.09);
  --text:    #f1f5f9;
  --muted:   #94a3b8;
  --muted2:  #64748b;
  --accent:  #f59e0b;
  --blue:    #3b82f6;
  --green:   #4ade80;
  --red:     #f87171;
  --orange:  #fb923c;
  --yellow:  #fbbf24;
  --mono:    'Space Mono', monospace;
  --sans:    'DM Sans', sans-serif;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:15px; }
a { color:inherit; text-decoration:none; }
button { cursor:pointer; font-family:var(--sans); }
input,select,textarea { font-family:var(--sans); }

/* ── HEADER ── */
header {
  position:sticky; top:0; z-index:100;
  background:linear-gradient(to bottom, rgba(10,15,26,0.96) 0%, rgba(10,15,26,0) 100%);
  padding:12px 14px 28px 110px;
  display:flex; align-items:flex-start; justify-content:flex-end; gap:12px;
  overflow:visible; border:none;
}
.gary-logo {
  position:fixed; top:0; left:0;
  height:128px; width:auto; z-index:101; pointer-events:none;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
}
.menu-wrap { position:relative; }
.hamburger-btn {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  width:42px; height:42px; border-radius:10px; padding:0;
  display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; transition:all .15s;
}
.hamburger-btn:hover { border-color:rgba(245,158,11,.35); }
.hamburger-btn[aria-expanded="true"] {
  background:rgba(245,158,11,.15); border-color:rgba(245,158,11,.45); color:var(--accent);
}
.hamburger-btn span {
  display:block; width:20px; height:2px; background:currentColor; border-radius:2px;
}
.calc-btn {
  background:var(--bg3); border:1px solid var(--border);
  height:42px; padding:4px 8px; border-radius:10px;
  display:inline-flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.calc-btn img {
  height:30px; width:auto; display:block;
  image-rendering:pixelated; image-rendering:-moz-crisp-edges;
}
.calc-modal-icon {
  height:28px; width:auto; display:block;
  image-rendering:pixelated; image-rendering:-moz-crisp-edges;
}
.calc-btn:hover { border-color:rgba(59,130,246,.4); background:rgba(59,130,246,.08); }
.main-menu {
  position:absolute; top:calc(100% + 8px); right:0;
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:6px; min-width:220px; z-index:200;
  box-shadow:0 12px 32px rgba(0,0,0,.5);
}
.menu-header {
  padding:10px 12px; margin-bottom:4px;
  border-bottom:1px solid var(--border);
  font-family:var(--mono); font-size:12px; color:var(--muted);
  letter-spacing:.06em; text-transform:lowercase; word-break:break-all;
}
.menu-item {
  width:100%; background:none; border:none; color:var(--text);
  padding:11px 12px; border-radius:8px; font-size:14px; font-family:var(--mono);
  text-align:left; display:flex; align-items:center; gap:10px;
}
.menu-item:hover { background:rgba(245,158,11,.1); }
.menu-item.active { background:rgba(245,158,11,.15); color:var(--accent); }
.menu-item.danger:hover { background:rgba(239,68,68,.12); color:var(--red); }
.menu-item:disabled { opacity:.4; cursor:not-allowed; }
.menu-divider { height:1px; background:var(--border); margin:4px 6px; }

/* ── RAPPELS PANIERS FOURNISSEURS ── */
.reminders-container {
  display:flex; flex-direction:column; gap:8px;
  padding:10px 10px 0;
}
.reminder-banner {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:12px 14px; border-radius:10px;
  font-size:14px; font-weight:500; line-height:1.3;
  cursor:pointer; border:1px solid transparent;
  transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
}
.reminder-banner:hover { transform: translateY(-1px); }
.reminder-banner:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.reminder-banner.reminder-today {
  background:rgba(234,179,8,.12); border-color:rgba(234,179,8,.30); color:#fde68a;
}
.reminder-banner.reminder-late {
  background:rgba(249,115,22,.14); border-color:rgba(249,115,22,.35); color:#fed7aa;
}
.reminder-banner.reminder-overdue {
  background:rgba(220,38,38,.14); border-color:rgba(220,38,38,.40); color:#fecaca;
}
.reminder-text { flex:1; min-width:0; }
.reminder-arrow { font-size:18px; opacity:.7; flex:0 0 auto; }

/* ── STATS ── */
.stats-bar {
  display:grid; grid-template-columns:repeat(4, 1fr); gap:6px;
  padding:10px 10px; border-bottom:1px solid var(--border); 
}
.stat-chip {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:8px 4px; font-family:var(--mono); color:var(--text); min-width:0;
}
.stat-chip.stat-spacer {
  background:transparent; border-color:transparent; pointer-events:none;
}
.stat-num { font-weight:700; font-size:20px; line-height:1.1; }
.stat-label { font-size:10px; color:var(--muted); letter-spacing:.04em; text-transform:lowercase; white-space:nowrap; }

/* ── TOOLBAR ── */
.toolbar { padding:12px 14px; display:flex; gap:8px; background:var(--bg2); border-bottom:1px solid var(--border); }
.search-input { flex:1; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; outline:none; }
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:rgba(59,130,246,.4); }
.filter-select { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:10px 10px; border-radius:8px; font-size:13px; outline:none; min-width:96px; }

/* ── ORDERS ── */
.orders-container { padding:14px 12px 24px; display:flex; flex-direction:column; gap:12px; }

/* ── ORDER CARD ── */
.order-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color .2s; }
.order-card.urgent { border-color:rgba(239,68,68,.35); }
.order-card.complete { border-color:rgba(74,222,128,.25); }
.order-card.in-progress { border-color:rgba(245,158,11,.2); }

.card-header { padding:14px 16px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; cursor:pointer; user-select:none; }
.card-ref-row {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  font-family:var(--mono); line-height:1.1;
}
.card-ref {
  font-size:13px; color:var(--accent); font-weight:700; letter-spacing:.04em;
  text-decoration:none; border-bottom:1px dashed rgba(245,158,11,.4);
}
.card-ref:hover { color:#fcd34d; border-bottom-color:rgba(245,158,11,.8); }
.card-ref-meta { font-size:12px; color:var(--muted); font-weight:400; letter-spacing:.02em; }
.pdf-btn {
  background:none; border:none; padding:0 2px; font-size:15px; line-height:1;
  color:var(--muted); cursor:pointer; transition:transform .15s, color .15s;
}
.pdf-btn:hover { color:var(--accent); transform:scale(1.15); }
.pdf-btn:disabled { opacity:.5; cursor:wait; }
.card-client { font-size:17px; font-weight:600; margin-top:6px; color:var(--text); }
.card-meta { font-size:13px; color:var(--muted); font-family:var(--mono); margin-top:6px; display:flex; gap:10px; flex-wrap:wrap; }
.urgent-badge { background:rgba(239,68,68,.18); color:var(--red); border:1px solid rgba(239,68,68,.35); padding:2px 7px; border-radius:99px; font-size:11px; font-family:var(--mono); }
.card-right { display:flex; flex-direction:row; align-items:center; gap:8px; flex-shrink:0; }
.progress-badge { font-family:var(--mono); font-size:14px; font-weight:700; padding:4px 10px; border-radius:99px; }
.p0   { background:rgba(248,113,113,.15); color:var(--red); }
.p25  { background:rgba(248,113,113,.15); color:var(--red); }
.p50  { background:rgba(251,146,60,.18);  color:var(--orange); }
.p75  { background:rgba(251,191,36,.18);  color:var(--yellow); }
.p100 { background:rgba(74,222,128,.18);  color:var(--green); }
.expand-icon { font-size:11px; color:var(--muted); transition:transform .2s; }
.expand-icon.open { transform:rotate(180deg); }

.progress-bar-thin { height:6px; background:var(--bg3); border-radius:99px; overflow:hidden; margin:0 16px 12px; }
.progress-fill { height:100%; border-radius:99px; transition:width .4s ease, background .3s ease; }

/* ── CARD BODY ── */
.card-body { padding:0 12px 12px; display:flex; flex-direction:column; gap:6px; }

.lines-summary { margin:0 12px 10px; background:rgba(255,255,255,.03); border-radius:8px; padding:10px 12px; border:1px solid var(--border); }
.lines-title { font-size:11px; color:var(--muted); font-family:var(--mono); margin-bottom:6px; letter-spacing:.08em; font-weight:700; }
.line-item { font-size:13px; color:#cbd5e1; padding:3px 0; }
.line-item strong { color:var(--text); }

/* ── META EDIT ROW ── */
.meta-row { margin:0 12px 10px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.meta-input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:6px; font-size:13px; outline:none; }
.meta-input:focus { border-color:rgba(245,158,11,.4); }
.meta-label { font-size:11px; color:var(--muted); font-family:var(--mono); font-weight:700; }
.priority-btn { font-size:12px; padding:5px 10px; border-radius:99px; border:1px solid rgba(255,255,255,.15); background:transparent; color:var(--muted); font-family:var(--mono); }
.priority-btn.urgent { background:rgba(239,68,68,.18); color:var(--red); border-color:rgba(239,68,68,.35); }
.priority-btn.normal { background:rgba(74,222,128,.12); color:var(--green); border-color:rgba(74,222,128,.28); }
.contact-chip {
  font-size:12px; padding:5px 10px; border-radius:99px;
  background:rgba(255,255,255,.04); border:1px solid var(--border);
  color:var(--text); font-family:var(--mono);
  display:inline-flex; align-items:center; gap:5px;
  text-decoration:none; max-width:220px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  transition:border-color .15s, background .15s, color .15s;
}
.contact-chip:hover { background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.35); color:var(--accent); }
.contact-desktop { display:none; cursor:text; user-select:all; max-width:none; }
.contact-desktop:hover { background:rgba(255,255,255,.04); border-color:var(--border); color:var(--text); }
@media (min-width:768px) {
  .contact-chip.contact-mobile { display:none; }
  .contact-chip.contact-desktop { display:inline-flex; }
}
.mail-btn.to-invoice {
  background:rgba(239,68,68,.18); color:var(--red);
  border-color:rgba(239,68,68,.45); font-weight:700;
  animation:pulse-invoice 2.5s ease-in-out infinite;
}
.mail-btn.to-invoice:hover { background:rgba(239,68,68,.30); border-color:rgba(239,68,68,.6); color:var(--red); }
.mail-btn.to-invoice.done {
  background:rgba(148,163,184,.10); color:#94a3b8;
  border-color:rgba(148,163,184,.35); font-weight:600;
  animation:none; opacity:.55;
}
.mail-btn.to-invoice.done:hover {
  background:rgba(148,163,184,.18); border-color:rgba(148,163,184,.5); color:#cbd5e1; opacity:.8;
}
@keyframes pulse-invoice {
  0%,100% { box-shadow:0 0 0 0 rgba(239,68,68,0); }
  50%     { box-shadow:0 0 0 4px rgba(239,68,68,.18); }
}

/* ── STEP ROW ── */
.step-row { display:flex; flex-direction:column; gap:5px; padding:10px 12px; border-radius:8px; background:rgba(255,255,255,.03); border:1px solid transparent; transition:all .2s; }
.step-row.done { background:rgba(74,222,128,.07); border-color:rgba(74,222,128,.2); }
.step-row-top { display:flex; align-items:center; gap:8px; }
.step-check { background:none; border:none; font-size:22px; line-height:1; padding:0; flex-shrink:0; transition:transform .15s; }
.step-check:active { transform:scale(.85); }
.step-label { font-family:var(--mono); font-size:13px; letter-spacing:.03em; flex:1; font-weight:500; }
.step-row.done .step-label { color:var(--green); }
.step-row:not(.done) .step-label { color:#cbd5e1; }

.mail-btn { font-size:12px; padding:5px 10px; border-radius:99px; border:1px solid; font-family:var(--mono); text-decoration:none; display:inline-flex; align-items:center; gap:4px; flex-shrink:0; }
.mail-client  { background:rgba(59,130,246,.12); color:#bfdbfe;    border-color:rgba(59,130,246,.3); }
.mail-btn.mail-client.has-sent { background:rgba(74,222,128,.14); color:#bbf7d0; border-color:rgba(74,222,128,.35); }

.livraison-info { padding-left:34px; font-size:13px; color:var(--muted); display:flex; flex-direction:column; gap:4px; }
.livraison-info .addr { color:var(--text); font-weight:500; }
.livraison-toggle { display:flex; gap:6px; margin-bottom:5px; }
.type-btn { font-size:12px; padding:4px 10px; border-radius:99px; border:1px solid rgba(255,255,255,.15); background:transparent; color:var(--muted); font-family:var(--mono); }
.type-btn.active { background:rgba(163,230,53,.18); color:#a3e635; border-color:rgba(163,230,53,.35); }

/* ── ARCHIVE BANNER ── */
.archive-banner {
  margin:0 12px 10px; padding:10px 14px; border-radius:8px;
  background:rgba(74,222,128,.1); border:1px solid rgba(74,222,128,.25);
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
}
.archive-banner-text { font-size:13px; color:var(--green); font-family:var(--mono); }
.archive-confirm-btn {
  font-size:12px; padding:5px 12px; border-radius:99px;
  background:rgba(74,222,128,.18); border:1px solid rgba(74,222,128,.35);
  color:var(--green); font-family:var(--mono);
}
.archive-cancel-btn {
  font-size:12px; padding:5px 12px; border-radius:99px;
  background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.25);
  color:var(--red); font-family:var(--mono);
}

/* ── LOGIN ── */
#login-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
.login-box { width:100%; max-width:360px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:32px 24px; }
.login-logo { font-family:var(--mono); font-size:24px; color:var(--accent); font-weight:700; letter-spacing:.1em; margin-bottom:6px; }
.login-sub { font-size:14px; color:var(--muted); margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:12px; color:var(--muted); font-family:var(--mono); letter-spacing:.06em; margin-bottom:6px; display:block; font-weight:700; }
.form-input { width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:11px 12px; border-radius:8px; font-size:15px; outline:none; transition:border-color .2s; }
.form-input::placeholder { color:var(--muted2); }
.form-input:focus { border-color:rgba(245,158,11,.4); }
.btn-primary { width:100%; background:var(--accent); color:#000; padding:12px; border:none; border-radius:8px; font-size:15px; font-weight:600; margin-top:8px; }
.btn-primary:disabled { opacity:.4; }
.error-msg { font-size:13px; color:var(--red); margin-top:8px; text-align:center; font-family:var(--mono); }

/* ── SETTINGS ── */
#settings-screen { flex:1; padding:18px; max-width:600px; margin:0 auto; width:100%; }
.settings-title { font-family:var(--mono); font-size:16px; color:var(--accent); margin-bottom:18px; letter-spacing:.06em; font-weight:700; }
.settings-section { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:14px; }
.section-title { font-size:12px; color:var(--muted); font-family:var(--mono); letter-spacing:.08em; margin-bottom:14px; font-weight:700; }
.fourn-row {
  display:flex; flex-direction:column; gap:8px;
  margin-bottom:12px; padding:12px;
  border-radius:10px; background:rgba(255,255,255,.03);
  border:1px solid var(--border);
}
.fourn-name { font-family:var(--mono); font-size:14px; color:var(--accent); font-weight:700; letter-spacing:.04em; }
.fourn-row .form-input { width:100%; font-size:14px; padding:10px 12px; }
@media (min-width:600px) {
  .fourn-row { flex-direction:row; align-items:center; flex-wrap:wrap; gap:10px; }
  .fourn-name { min-width:90px; flex-shrink:0; }
  .fourn-row .form-input { flex:1; min-width:140px; width:auto; }
}
.btn-save { background:rgba(245,158,11,.18); border:1px solid rgba(245,158,11,.35); color:#fcd34d; padding:10px 18px; border-radius:8px; font-size:14px; font-family:var(--mono); margin-top:10px; }
.btn-danger { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.25); color:var(--red); padding:10px 18px; border-radius:8px; font-size:14px; font-family:var(--mono); }
.btn-logout { background:rgba(100,116,139,.12); border:1px solid rgba(100,116,139,.25); color:var(--text); padding:10px 18px; border-radius:8px; font-size:14px; font-family:var(--mono); }
.purge-info { font-size:13px; color:var(--muted); margin-bottom:12px; line-height:1.5; }

/* ── TOAST ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:12px 20px; border-radius:99px; font-size:14px; font-family:var(--mono); z-index:999; animation:fadeUp .3s ease, fadeOut .3s ease 2.2s forwards; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.35); }
@keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes fadeOut { to{opacity:0} }

/* ── MODAL MESSAGE CLIENT ── */
.modal-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.72);
  display:flex; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(4px);
  animation:fadeIn .18s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:14px;
  width:100%; max-width:580px; max-height:92dvh;
  display:flex; flex-direction:column;
  box-shadow:0 24px 60px rgba(0,0,0,.55);
  overflow:hidden;
}
.modal-header {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:14px 16px; border-bottom:1px solid var(--border);
  background:linear-gradient(to bottom, rgba(59,130,246,.06), transparent);
}
.modal-title { font-family:var(--mono); font-size:14px; color:var(--accent); font-weight:700; letter-spacing:.04em; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.modal-title .modal-title-icon { font-size:24px; line-height:1; flex-shrink:0; }
.modal-title-text { display:flex; flex-direction:column; min-width:0; }
.modal-title small { color:var(--muted); font-size:11px; font-weight:400; margin-top:2px; letter-spacing:.02em; }
.modal-close {
  background:none; border:none; color:var(--muted); font-size:32px; line-height:1;
  padding:10px 14px; margin:-4px -8px -4px 0; border-radius:10px; cursor:pointer;
  min-width:44px; min-height:44px;
  display:inline-flex; align-items:center; justify-content:center;
}
.modal-close:hover { color:var(--text); background:rgba(255,255,255,.05); }
.modal-body {
  flex:1; overflow-y:auto; padding:14px 16px;
  display:flex; flex-direction:column; gap:14px;
}
.modal-body .field-label {
  font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.08em;
  font-weight:700; text-transform:uppercase; margin-bottom:6px; display:block;
}
.modal-body .field-input, .modal-body .field-textarea {
  width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text);
  padding:10px 12px; border-radius:8px; font-size:14px; outline:none;
  font-family:var(--sans); transition:border-color .15s;
}

  expanded:new Set(),
  search:"", filter:"all",
  loading:false, syncing:false,
  loginEmail:"", loginPass:"", loginError:"",
  archivePending: new Set(), // order_ids en attente de confirmation archivage
  userMenuOpen: false,
  // --- supplier cart ---
  suppliersByKey: {},        // { 'viral': { key, name, email, cc, template_*, mail_mode, ... } }
  supplierCartItems: [],     // items en attente (sent_at NULL) de tous les fournisseurs
  supplierSentIndex: new Set(), // "oid|stepId" pour lesquels au moins un envoi a déjà été fait
  expandedPreviews: new Set(),  // supplier_keys dont l'aperçu mail est déroulé (vue Paniers)
  expandedSupplierKeys: new Set(), // keys des fournisseurs dont la carte Réglages est dépliée
  // Historique d'envois par (order, step) → Map<supplier_key, { logs, count_total, count_reminders, last_sent_at, first_batch_id, last_subject }>
  // Alimenté depuis supplier_messages_log (seulement les lignes avec order_id + step_id renseignés).
  sendHistoryIndex: new Map(),

  settings: { archive_delay_days: DEFAULT_ARCHIVE_DELAY_DAYS, purge_delay_days: DEFAULT_PURGE_DELAY_DAYS },

// ══════════════════════════════════════════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════════════════════════════════════════
function initSB() { sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey); }

async function sbGet(table, eq) {
  let q = sb.from(table).select("*");
  if (eq) q = q.eq(eq[0], eq[1]);
  const { data, error } = await q;
  if (error) throw error;
  return data || [];
}

// Slug stable pour un nom d'affichage fournisseur.
// "Surf System" → "surf_system", "FCS" → "fcs"
function supplierNameToKey(name) {
  if (!name) return null;
  return String(name).toLowerCase().trim().replace(/\s+/g, "_");
}

// Jours de la semaine (1 = lundi, 7 = dimanche)
const WEEKDAYS_FR = ["", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi", "dimanche"];

// ══════════════════════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════════════════════
async function login(email, pass) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) throw error;
  return data.user;
}
async function logout() {
  await sb.auth.signOut();
  S.user = null; S.view = "login"; render();
}
async function checkSession() {
  const { data } = await sb.auth.getSession();
  if (data.session?.user) { S.user = data.session.user; S.view = "orders"; await loadAll(); }
}

async function loadAll() {
  S.loading = true; render();
  // Settings chargés en premier : checkAutoArchive/checkAutoPurge (appelés dans syncOdoo) en dépendent.
  await loadSettings();
  await Promise.all([loadFournisseurs(), loadStepsAndMeta(), syncOdoo(), loadSupplierCart(), loadSupplierSendHistory()]);
  S.loading = false; render();
}

async function loadSettings() {
  try {
    const { data, error } = await sb.from("app_settings").select("*").eq("id", 1).maybeSingle();
    if (error) { console.warn("loadSettings:", error); return; }
    if (data) {
      S.settings.archive_delay_days = data.archive_delay_days ?? S.settings.archive_delay_days;
      S.settings.purge_delay_days   = data.purge_delay_days   ?? S.settings.purge_delay_days;
    }
  } catch (e) {
    console.warn("loadSettings (exception):", e);
  }
}

async function loadFournisseurs() {
  const data = await sbGet("fournisseurs");
  S.fournisseurs = {};
  S.suppliersByKey = {};
  data.forEach(f => {
    S.fournisseurs[f.name] = { email:f.email||"", phone:f.phone||"", contact:f.contact_nom||"", id:f.id };
    const key = f.key || supplierNameToKey(f.name);
    if (key) {
      S.suppliersByKey[key] = {
        id: f.id,
        key,
        name: f.name || "",
        email: f.email || "",
        phone: f.phone || "",
        contact_nom: f.contact_nom || "",
        cc: Array.isArray(f.cc) ? f.cc : [],
        delai_livraison_jours: f.delai_livraison_jours ?? 7,
        mail_mode: f.mail_mode || "instantané",
        mail_jour: f.mail_jour ?? 1,
        mail_heure: f.mail_heure || "08:00:00",
        template_subject: f.template_subject || (window.SUPPLIER_TEMPLATES?.defaultSubject || "Commande NOTOX — {date}"),
        template_header:  f.template_header  || (window.SUPPLIER_TEMPLATES?.defaultHeader  || "Bonjour,\n\nVoici notre commande :"),
        template_footer:  f.template_footer  || (window.SUPPLIER_TEMPLATES?.defaultFooter  || "Merci,\nNOTOX"),
        notes: f.notes || "",
        active: f.active !== false,
      };
    }
  });
}

async function loadSupplierCart() {
  // On charge TOUS les items (pending + envoyés) pour pouvoir afficher les
  // indicateurs "déjà envoyé" sur les étapes. Volume faible attendu.
  const { data, error } = await sb.from("supplier_cart_items").select("*").order("added_at", { ascending: true });
  if (error) { console.warn("loadSupplierCart:", error); S.supplierCartItems = []; S.supplierSentIndex = new Set(); return; }
  S.supplierCartItems = (data || []).filter(it => !it.sent_at);
  S.supplierSentIndex = new Set();
  (data || []).forEach(it => {
    if (it.sent_at && it.order_id != null && it.step_id) {
      S.supplierSentIndex.add(`${it.order_id}|${it.step_id}`);
    }
  });
}

// Charge l'historique d'envois (supplier_messages_log) et construit l'index
// sendHistoryIndex : Map "oid|stepId" → Map<supplier_key, stats>.
// On ne considère que les lignes qui ont order_id + step_id renseignés ;
// les envois anciens sans ces colonnes restent invisibles côté relance (OK,
// la relance se teste sur les prochains envois).
async function loadSupplierSendHistory() {
  const { data, error } = await sb
    .from("supplier_messages_log")
    .select("batch_id, supplier_key, subject, is_reminder, parent_batch_id, order_id, step_id, sent_at, item_count")
    .not("order_id", "is", null)
    .not("step_id", "is", null)
    .order("sent_at", { ascending: true });
  if (error) { console.warn("loadSupplierSendHistory:", error); S.sendHistoryIndex = new Map(); return; }

  const idx = new Map();
  for (const r of data || []) {
    const k = `${r.order_id}|${r.step_id}`;
    if (!idx.has(k)) idx.set(k, new Map());
    const bySupplier = idx.get(k);
    if (!bySupplier.has(r.supplier_key)) {
      bySupplier.set(r.supplier_key, {
        logs: [],
        count_total: 0,
        count_reminders: 0,
        first_batch_id: null,
        last_batch_id: null,
        last_sent_at: null,
        last_subject: null,
      });
    }
    const s = bySupplier.get(r.supplier_key);
    s.logs.push(r);
    s.count_total += 1;
    if (r.is_reminder) s.count_reminders += 1;
    else if (!s.first_batch_id) s.first_batch_id = r.batch_id;
    s.last_batch_id = r.batch_id;
    s.last_sent_at = r.sent_at;
    s.last_subject = r.subject;
  }
  S.sendHistoryIndex = idx;
}

// Retourne la liste des fournisseurs ayant au moins 1 envoi pour (order_id, step_id).
// Chaque entrée : { key, name, stats } où stats = { count_total, count_reminders, last_sent_at, first_batch_id, last_subject }.
function getSupplierSendsForStep(orderId, stepId) {
  const bySupplier = S.sendHistoryIndex.get(`${orderId}|${stepId}`);
  if (!bySupplier) return [];
  const out = [];
  for (const [key, stats] of bySupplier.entries()) {
    const sup = S.suppliersByKey[key];
    if (!sup) continue;
    out.push({ key, name: sup.name, stats });
  }
  out.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
  return out;
}

function pendingItemsForSupplier(key) {
  return S.supplierCartItems.filter(it => it.supplier_key === key);
}

function totalPendingCartCount() {
  return S.supplierCartItems.length;
}

// Renvoie la dernière occurrence de (jourSemaine, heure) <= now.
// mailJour : 1=lundi … 7=dimanche. timeStr : "HH:MM:SS".
function getLastScheduledDateTime(mailJour, timeStr, now) {
  const [hh, mm] = String(timeStr || "00:00:00").split(":").map(Number);
  const targetJsDay = mailJour === 7 ? 0 : mailJour; // JS : 0=dim … 6=sam
  const candidate = new Date(now);
  candidate.setHours(hh || 0, mm || 0, 0, 0);
  while (candidate.getDay() !== targetJsDay || candidate > now) {
    candidate.setDate(candidate.getDate() - 1);
  }
  return candidate;
}

function getDayNameCapitalized(mailJour) {
  const w = WEEKDAYS_FR[mailJour];
  return w ? w.charAt(0).toUpperCase() + w.slice(1) : "?";
}

// Retourne { daysOverdue, wording, className } ou null si pas de rappel.
function computeSupplierReminder(supplier) {
  if (!supplier || supplier.active === false) return null;
  if (supplier.mail_mode !== "hebdo") return null;
  if (!supplier.mail_jour || !supplier.mail_heure) return null;
  const allPending = pendingItemsForSupplier(supplier.key);
  if (!allPending.length) return null;
  const now = new Date();
  const scheduled = getLastScheduledDateTime(supplier.mail_jour, supplier.mail_heure, now);
  const daysOverdue = Math.floor((now - scheduled) / 86400000);
  if (daysOverdue < 0 || daysOverdue > 30) return null;
  // N'alerter que sur les items antérieurs à la dernière fenêtre d'envoi prévue :
  // un item ajouté après `scheduled` n'était pas en instance à l'heure d'envoi.
  const items = allPending.filter(it => it.added_at && new Date(it.added_at) < scheduled);
  if (!items.length) return null;
  const n = items.length;
  const name = supplier.name || supplier.key;
  if (daysOverdue === 0) {
    return {
      daysOverdue,
      wording: `📦 ${getDayNameCapitalized(supplier.mail_jour)} — pense à envoyer le panier ${name} (${n} items)`,
      className: "reminder-today",
    };
  }
  if (daysOverdue <= 3) {
    return {
      daysOverdue,
      wording: `⚠️ Panier ${name} en retard depuis ${daysOverdue} jour${daysOverdue > 1 ? "s" : ""} (${n} items)`,
      className: "reminder-late",
    };
  }
  return {
    daysOverdue,
    wording: `🔴 Panier ${name} oublié — ${daysOverdue} jours de retard (${n} items)`,
    className: "reminder-overdue",
  };
}

async function loadStepsAndMeta() {
  const [stepsData, metaData] = await Promise.all([sbGet("order_steps"), sbGet("order_meta")]);
  S.steps = {};
  stepsData.forEach(s => {
    if (!S.steps[s.order_id]) S.steps[s.order_id] = {};
    S.steps[s.order_id][s.step_id] = { done:s.done, fournisseur:s.fournisseur, mail_sent:s.mail_sent, mail_relance:s.mail_relance };
  });
  S.meta = {};
  metaData.forEach(m => { S.meta[m.order_id] = { delivery_type:m.delivery_type, priority:m.priority, dimensions:m.dimensions, due_date:m.due_date, archived:m.archived, archived_at:m.archived_at, emails_sent:m.emails_sent || {} }; });
}

async function syncOdoo() {
  S.syncing = true; render();
  try {
    const resp = await fetch(`${CONFIG.backendUrl}/orders`, { headers:{ "x-api-secret":CONFIG.apiSecret } });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    S.orders = data.orders || [];
    // Upsert meta pour nouvelles commandes.
    // On ne seed PAS delivery_type : null = "pas de choix explicite" → déduit
    // dynamiquement de la présence d'une ligne SHIP (cf. getEffectiveDeliveryType).
    for (const o of S.orders) {
      if (!S.meta[o.id]) {
        await sb.from("order_meta").upsert({ order_id:o.id, order_name:o.name, priority:"normal", emails_sent:{} }, { onConflict:"order_id" });
        S.meta[o.id] = { delivery_type:null, priority:"normal", archived:false, emails_sent:{} };
      }
    }
    // Vérifier archivages et purges automatiques
    await checkAutoArchive();
    await checkAutoPurge();
  } catch(e) {
    console.error(e);
    showToast("⚠ Erreur sync Odoo : " + e.message);
  }
  S.syncing = false;
}

// ══════════════════════════════════════════════════════════════════════════════
// ARCHIVAGE AUTOMATIQUE
// Déclenché quand livraison est cochée. Archivage effectif après S.settings.archive_delay_days jours.
// ══════════════════════════════════════════════════════════════════════════════
async function checkAutoArchive() {
  for (const o of S.orders) {
    const meta = S.meta[o.id];
    if (!meta || meta.archived) continue;
    const livraisonStep = (S.steps[o.id] || {})["livraison"];
    if (!livraisonStep?.done) continue;

    // Récupérer la date de cochage depuis Supabase
    const { data } = await sb.from("order_steps")
      .select("done_at").eq("order_id", o.id).eq("step_id", "livraison").single();
    if (!data?.done_at) continue;

    const doneAt = new Date(data.done_at);
    const diffDays = (Date.now() - doneAt.getTime()) / (1000 * 60 * 60 * 24);
    if (diffDays >= S.settings.archive_delay_days) {
      // Archivage automatique
      await archiveOrder(o.id, true);
    } else {
      // En attente — afficher la bannière de confirmation
      S.archivePending.add(o.id);
    }
  }
}

async function archiveOrder(orderId, auto = false) {
  const now = new Date().toISOString();
  S.meta[orderId] = { ...(S.meta[orderId] || {}), archived:true, archived_at:now };
  S.archivePending.delete(orderId);
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_meta").upsert({ order_id:orderId, order_name:order?.name||"", archived:true, archived_at:now }, { onConflict:"order_id" });
  await logHistory(orderId, order?.name||"", null, "archived", auto ? "auto" : "manuel", "");
  showToast(`📦 ${order?.name || "Commande"} archivée`);
  render();
}

async function unarchiveOrder(orderId) {
  S.meta[orderId] = { ...(S.meta[orderId] || {}), archived:false };
  S.archivePending.delete(orderId);
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_meta").upsert({ order_id:orderId, order_name:order?.name||"", archived:false }, { onConflict:"order_id" });
  render();
}

// Supprime toutes les traces d'une liste de commandes purgées.
// Ordre : supplier_messages_log → supplier_cart_items → order_steps → order_meta.
async function deletePurgedOrderData(orderIds) {
  if (!orderIds.length) return;
  await sb.from("supplier_messages_log").delete().in("order_id", orderIds);
  await sb.from("supplier_cart_items").delete().in("order_id", orderIds);
  await sb.from("order_steps").delete().in("order_id", orderIds);
  await sb.from("order_meta").delete().in("order_id", orderIds);
}

async function checkAutoPurge() {
  const toPurge = [];
  for (const [oid, meta] of Object.entries(S.meta)) {
    if (!meta.archived || !meta.archived_at) continue;
    const archivedAt = new Date(meta.archived_at);
    const diffDays = (Date.now() - archivedAt.getTime()) / (1000 * 60 * 60 * 24);
    if (diffDays >= S.settings.purge_delay_days) toPurge.push(parseInt(oid));
  }
  if (!toPurge.length) return;
  await deletePurgedOrderData(toPurge);
  for (const id of toPurge) { delete S.meta[id]; delete S.steps[id]; }
  S.orders = S.orders.filter(o => !toPurge.includes(o.id));
  await Promise.all([loadSupplierCart(), loadSupplierSendHistory()]);
  console.log(`Auto-purge: ${toPurge.length} commande(s) supprimée(s)`);
}

async function purgeArchived() {
  const archivedIds = Object.entries(S.meta).filter(([,v]) => v.archived).map(([k]) => parseInt(k));
  if (!archivedIds.length) { showToast("Rien à purger"); return; }
  await deletePurgedOrderData(archivedIds);
  await Promise.all([loadStepsAndMeta(), loadSupplierCart(), loadSupplierSendHistory()]);
  S.orders = S.orders.filter(o => !archivedIds.includes(o.id));
  showToast(`🗑 ${archivedIds.length} commande(s) purgée(s) (+ panier et historique mails)`);
  render();
}

// ══════════════════════════════════════════════════════════════════════════════
// ACTIONS ÉTAPES
// ══════════════════════════════════════════════════════════════════════════════
async function toggleStep(orderId, stepId, currentDone) {
  const newDone = !currentDone;
  if (!S.steps[orderId]) S.steps[orderId] = {};
  S.steps[orderId][stepId] = { ...(S.steps[orderId][stepId]||{}), done:newDone };
  render();
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_steps").upsert({
    order_id:orderId, order_name:order?.name||"", step_id:stepId,
    done:newDone, fournisseur:S.steps[orderId][stepId]?.fournisseur||null,
    mail_sent:S.steps[orderId][stepId]?.mail_sent||false,
    mail_relance:S.steps[orderId][stepId]?.mail_relance||false,
    updated_by:S.user.id,
  }, { onConflict:"order_id,step_id" });
  await logHistory(orderId, order?.name||"", stepId, newDone?"step_done":"step_undone", "", S.user.email||"");
  // Si livraison cochée → préparer archivage
  if (stepId === "livraison" && newDone) {
    S.archivePending.add(orderId);
    render();
  }
  if (stepId === "livraison" && !newDone) {
    S.archivePending.delete(orderId);
    render();
  }
}

async function markMailSent(orderId, stepId, isRelance) {
  if (!S.steps[orderId]) S.steps[orderId] = {};
  const cur = S.steps[orderId][stepId] || {};
  S.steps[orderId][stepId] = { ...cur, mail_sent:true, mail_relance:isRelance||cur.mail_relance };
  render();
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_steps").upsert({
    order_id:orderId, order_name:order?.name||"", step_id:stepId,
    done:cur.done||false, fournisseur:cur.fournisseur||null,
    mail_sent:true, mail_relance:isRelance||cur.mail_relance||false,
    updated_by:S.user.id,
  }, { onConflict:"order_id,step_id" });
  await logHistory(orderId, order?.name||"", stepId, isRelance?"mail_relance":"mail_sent", cur.fournisseur||"", S.user.email||"");
}

async function setDeliveryType(orderId, type) {
  S.meta[orderId] = { ...(S.meta[orderId]||{}), delivery_type:type };
  render();
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_meta").upsert({ order_id:orderId, order_name:order?.name||"", delivery_type:type }, { onConflict:"order_id" });
}

async function setMeta(orderId, field, value) {
  S.meta[orderId] = { ...(S.meta[orderId]||{}), [field]:value };
  const order = S.orders.find(o => o.id === orderId);
  await sb.from("order_meta").upsert({ order_id:orderId, order_name:order?.name||"", [field]:value }, { onConflict:"order_id" });
}

async function recordClientEmailSent(order, stepId) {
  const prev = S.meta[order.id]?.emails_sent || {};
  const emails_sent = { ...prev, [stepId]:new Date().toISOString() };
  S.meta[order.id] = { ...(S.meta[order.id]||{}), emails_sent };
  try {
    await sb.from("order_meta").upsert({ order_id:order.id, order_name:order.name||"", emails_sent }, { onConflict:"order_id" });
  } catch(e) { console.warn("emails_sent upsert:", e); }
}

// Trace le clic sur une pastille Odoo (facturation_click / livraison_click).
// Clés distinctes des stepId réels pour ne pas interférer avec les envois mail client.
// Sémantique "date de validation initiale" : seul le PREMIER clic fixe la date,
// les clics suivants ré-ouvrent Odoo mais n'écrasent pas le timestamp.
async function recordOdooPastilleClick(order, key) {
  const prev = S.meta[order.id]?.emails_sent || {};
  if (prev[key]) return;
  const emails_sent = { ...prev, [key]:new Date().toISOString() };
  S.meta[order.id] = { ...(S.meta[order.id]||{}), emails_sent };
  try {
    await sb.from("order_meta").upsert({ order_id:order.id, order_name:order.name||"", emails_sent }, { onConflict:"order_id" });
  } catch(e) { console.warn("emails_sent (pastille) upsert:", e); }
}

async function downloadOrderPdf(orderId, orderName, btn) {
  const label = orderName || orderId;
  if (btn) { btn.disabled = true; btn.textContent = "⏳"; }
  try {
    const resp = await fetch(`${CONFIG.backendUrl}/orders/${orderId}/pdf`, {
      headers: { "x-api-secret": CONFIG.apiSecret },
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `commande-${label}.pdf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast(`📄 PDF ${label} téléchargé`);
  } catch (e) {
    console.error(e);
    showToast("⚠ Erreur PDF : " + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "📄"; }
  }
}

async function logHistory(orderId, orderName, stepId, action, value, userEmail) {
  try {
    await sb.from("order_history").insert({ order_id:orderId, order_name:orderName, step_id:stepId, action, value, user_email:userEmail, created_by:S.user?.id });
  } catch(e) { console.warn("log history:", e); }
}

// ══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function getProgress(orderId) {
  const steps = S.steps[orderId] || {};
  const order = S.orders.find(o => o.id === orderId);
  const hasShip = order ? orderHasShipLine(order) : true;
  // Seules les étapes de production comptent dans la progression.
  // facturation et livraison sont traçables via leurs pastilles À FACTURER 💰 et À VALIDER 📦,
  // mais n'affectent plus le pourcentage : la commande est "finie côté prod" dès post_cuisson.
  const NON_PROGRESS_STEPS = new Set(["facturation", "livraison"]);
  const EMBALLAGE_WEIGHT = 0.5;
  const applicable = STEPS.filter(s =>
    !NON_PROGRESS_STEPS.has(s.id) && (s.id !== "emballage" || hasShip)
  );
  let totalWeight = 0;
  let doneWeight = 0;
  for (const s of applicable) {
    const weight = (s.id === "emballage") ? EMBALLAGE_WEIGHT : 1;
    totalWeight += weight;
    if (steps[s.id]?.done) doneWeight += weight;
  }
  return totalWeight > 0 ? Math.round((doneWeight / totalWeight) * 100) : 0;
}
function pClass(p) { return p===100?"p100":p>=61?"p75":p>=31?"p50":"p25"; }
function pColor(p) { return p===100?"#4ade80":p>=61?"#fbbf24":p>=31?"#fb923c":"#f87171"; }
function fmtDate(s) { return s ? new Date(s).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"}) : ""; }
function fmtShortDate(s) { return s ? new Date(s).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}) : ""; }
function fmtDateTime(s) {
  if (!s) return "";
  const d = new Date(s);
  const date = d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
  const time = `${String(d.getHours()).padStart(2,"0")}h${String(d.getMinutes()).padStart(2,"0")}`;
  return `${date} à ${time}`;
}
function fmtAmount(n) { return n ? new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n) : ""; }
function buildAddr(p) { if(!p) return ""; return [p.street,p.zip,p.city,p.country_id?.[1]].filter(Boolean).join(", "); }

// true si la commande contient au moins une ligne "SHIP" (produit ou nom),
// utilisé pour (a) rendre l'étape emballage conditionnelle, (b) défaut dynamique
// de delivery_type quand l'utilisateur n'a pas fait de choix explicite.
function orderHasShipLine(order) {
  return (order?.lines_detail || []).some(l => {
    const label = (l.product_id?.[1] || l.name || "").trim();
    return label === "SHIP";
  });
}

// delivery_type effectif pour l'UI :
// - choix explicite de l'utilisateur (meta.delivery_type = "livraison"|"retrait") → respecté
// - sinon (null/absent) → déduit de la présence d'une ligne SHIP
function getEffectiveDeliveryType(order, meta) {
  if (meta?.delivery_type === "livraison" || meta?.delivery_type === "retrait") {
    return meta.delivery_type;
  }
  return orderHasShipLine(order) ? "livraison" : "retrait";
}

function escapeHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function fmtQty(n) {
  const v = Number(n);
  if (!isFinite(v)) return "0";
  return String(v);
}

function bindQtyArrowKeys(inp) {
  inp.addEventListener("keydown", e => {
    if (e.key !== "ArrowUp" && e.key !== "ArrowDown") return;
    e.preventDefault();
    const cur = parseFloat(inp.value);
    const base = isFinite(cur) ? cur : 0;
    const next = e.key === "ArrowUp" ? base + 1 : Math.max(0, base - 1);
    inp.value = fmtQty(next);
    inp.dispatchEvent(new Event("input", { bubbles: true }));
    inp.dispatchEvent(new Event("change", { bubbles: true }));
  });
}

function buildClientMessageDefaults(order, stepLabel, stepId, progress) {
  const rawName   = (order.partner_detail?.name || "").trim();
  const firstName = rawName.split(/\s+/)[0] || "";

  const subject = stepId === "livraison"
    ? `Commande NOTOX ${ref} – prête !`
    : `Commande NOTOX ${ref} – ${stepLabel} en cours !`;

  // Bug historique : `const MESSAGES` dans messages.js N'EST PAS attaché
  // à window (seuls var/function le sont). Il faut donc tester via typeof
  // sur l'identifiant global, pas via window.MESSAGES.
  const hasMessages = typeof MESSAGES !== "undefined";
  console.log("[msg] MESSAGES defined?", hasMessages, "stepId:", stepId, "keys:", hasMessages ? Object.keys(MESSAGES) : "—");
  const template = hasMessages ? (MESSAGES[stepId] || MESSAGES.default) : null;

// Redimensionne une image (côté long ≤ maxSide) et renvoie base64 + dataURL pour thumb.
async function resizeImageToBase64(file, maxSide = 1280, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxSide / img.width, maxSide / img.height, 1);
      const w = Math.max(1, Math.round(img.width  * ratio));
      const h = Math.max(1, Math.round(img.height * ratio));
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        if (!blob) return reject(new Error("toBlob a échoué"));
        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = reader.result;
          const base64 = String(dataUrl).split(",")[1] || "";
          resolve({ base64, dataUrl });
        };
        reader.onerror = () => reject(reader.error || new Error("lecture image"));
        reader.readAsDataURL(blob);
      }, "image/jpeg", quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("chargement image impossible")); };
    img.src = url;
  });
}

          body: bodyVal,
          partner_id: partnerId,
          attachments: photos.map(p => ({ name: p.name, data: p.data })),

        const txt = await resp.text().catch(() => "");
        throw new Error(`HTTP ${resp.status}${txt ? " — " + txt.slice(0, 200) : ""}`);
      }
      await resp.json().catch(() => ({}));
      close();
      showToast("✓ Message envoyé et archivé dans Odoo");
      if (stepId) {
        markMailSent(order.id, stepId, false);
        recordClientEmailSent(order, stepId);
      }
    } catch (err) {
      console.error(err);
      sendBtn.disabled = false;
      sendBtn.innerHTML = "📨 Envoyer";
      showToast("⚠ Envoi échoué : " + err.message);
    }
  });

  setTimeout(() => subjectEl?.focus(), 50);

// CSV : séparateur ';', 3 colonnes (type;name;price), BOM UTF-8 toléré en tête.
function parsePriceCsv(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if (lines.length === 0) return [];
  lines.shift(); // header
  const rows = [];
  for (const line of lines) {
    const cols = line.split(";");
    if (cols.length < 3) continue;
    const type     = (cols[0] || "").trim();
    const name     = (cols[1] || "").trim();
    const priceRaw = (cols[2] || "").trim();
    rows.push({
      type, name,
      price: priceRaw === "" ? null : Number(priceRaw),
    });
  }
  return rows;
}

// Catalogue indexé par type (clé = valeur exacte de la 1ère colonne du CSV),
// l'ordre du CSV est préservé dans chaque tableau.
function buildPriceCatalog(rows) {
  const cat = {};
  for (const r of rows) {
    if (!cat[r.type]) cat[r.type] = [];
    cat[r.type].push({ name: r.name, price: r.price });
  }
  return cat;
}

// Pas de cache applicatif : re-fetch + re-parse à chaque ouverture du calculateur,
// pour que toute modif de prices.csv soit prise en compte sans hard reload.
async function loadPriceCatalog() {
  const resp = await fetch(`./prices.csv?v=${Date.now()}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  return buildPriceCatalog(parsePriceCsv(text));
}

function renderCalcModal(overlay, catalog, close) {
  // Schéma des 11 menus déroulants. 'noneOption' = fournit un <option value="">— Aucun —</option>
  // en première position (sélectionnée par défaut). Tous les champs sont optionnels :
  // un devis pour accessoires seuls (sans planche) doit pouvoir partir sans taille ni modèle.
  const FIELDS = [
    { key: "model",          label: "Modèle",           noneOption: true, showPrice: false },
    { key: "size",           label: "Taille",           noneOption: true, showPrice: true  },
    { key: "construction",   label: "Construction",     noneOption: true, showPrice: true  },
    { key: "shape options",  label: "Options de shape", noneOption: true, showPrice: true  },
    { key: "fins setup",     label: "Setup de dérives", noneOption: true, showPrice: true  },
    { key: "deco",           label: "Déco",             noneOption: true, showPrice: true  },
    { key: "leash",          label: "Leash",            noneOption: true, showPrice: true  },
    { key: "fins",           label: "Dérives",          noneOption: true, showPrice: true  },
    { key: "boardbag",       label: "Housse",           noneOption: true, showPrice: true  },
    { key: "pad",            label: "Pad arrière",      noneOption: true, showPrice: true  },
    { key: "speciality",     label: "Spécialité",       noneOption: true, showPrice: true  },
  ];

  // État : pour chaque field.key, l'item sélectionné ou null. Tout démarre à null
  // (l'option « Aucun » de chaque <select> est sélectionnée par défaut côté DOM).
  const sel = Object.fromEntries(FIELDS.map(f => [f.key, null]));

  const card = overlay.querySelector(".modal-card");
  const oldBody = card.querySelector("#calc-body");

  const fieldId = (key) => `calc-${key.replace(/\s+/g, "-")}`;

  const renderOptions = (field) => {
    const items = catalog[field.key] || [];
    const opts = items.map((it, i) => {
      const labelTxt = field.showPrice && it.price != null
        ? `${it.name} — ${fmtEuro(it.price)}`
        : it.name;
      return `<option value="${i}">${escapeHtml(labelTxt)}</option>`;
    }).join("");
    if (field.noneOption) {
      return `<option value="">— Aucun —</option>${opts}`;
    }
    return opts;
  };

  oldBody.outerHTML = `
    <div class="modal-body" id="calc-body">
      ${FIELDS.map(f => `
      <div class="calc-section">
        <label class="field-label" for="${fieldId(f.key)}">${escapeHtml(f.label)}</label>
        <select id="${fieldId(f.key)}" class="calc-select" data-field="${escapeHtml(f.key)}">
          ${renderOptions(f)}
        </select>
      </div>`).join("")}

      <div>
        <button type="button" class="calc-detail-toggle" id="calc-detail-toggle">▸ Détail du calcul</button>
        <div class="calc-detail hidden" id="calc-detail"></div>
      </div>
    </div>`;

  // Footer
  card.insertAdjacentHTML("beforeend", `
    <div class="modal-footer" style="flex-direction:column; gap:8px;">
      <div class="calc-total-bar" style="width:100%;">
        <span class="calc-total-label">Total</span>
        <span class="calc-total-value" id="calc-total">—</span>
      </div>
      <div style="display:flex; gap:8px; width:100%;">
        <button class="btn-modal-send btn-calc-copy" id="calc-copy" style="flex:1;">📋 Copier</button>
        <button class="btn-modal-send" id="calc-email" style="flex:1;">📧 Email</button>
        <button class="btn-modal-send btn-calc-sms" id="calc-sms" style="flex:1;">💬 SMS</button>
      </div>
    </div>`);

  const body         = card.querySelector("#calc-body");
  const totalEl      = card.querySelector("#calc-total");
  const detailEl     = card.querySelector("#calc-detail");
  const detailToggle = card.querySelector("#calc-detail-toggle");
  const copyBtn      = card.querySelector("#calc-copy");
  const emailBtn     = card.querySelector("#calc-email");
  const smsBtn       = card.querySelector("#calc-sms");

  // Re-bind close sur les boutons ajoutés après render
  card.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", close));

  // Construit les lignes du devis : uniquement les champs sélectionnés (non « Aucun »).
  function buildLines() {
    const lines = [];
    let total = 0;
    for (const f of FIELDS) {
      const item = sel[f.key];
      if (!item) continue;
      if (item.price != null) {
        total += item.price;
        lines.push(`${f.label} : ${item.name} — ${fmtEuro(item.price)}`);
      } else {
        lines.push(`${f.label} : ${item.name}`);
      }
    }
    return { total, lines };
  }

  function recompute() {
    const { total, lines } = buildLines();
    const hasTotal = total > 0;
    totalEl.textContent = hasTotal ? fmtEuro(total) : "—";
    detailEl.textContent = lines.length
      ? lines.join("\n") + (hasTotal ? "\n─────────────\nTOTAL : " + fmtEuro(total) : "")
      : "Aucune sélection";
    copyBtn.disabled  = !hasTotal;
    emailBtn.disabled = !hasTotal;
    smsBtn.disabled   = !hasTotal;
    return { total, lines, hasTotal };
  }

  // Event delegation : tous les <select> du body remontent ici.
  body.addEventListener("change", (e) => {
    const selectEl = e.target;
    if (!selectEl || selectEl.tagName !== "SELECT" || !selectEl.dataset.field) return;
    const key = selectEl.dataset.field;
    const v = selectEl.value;
    sel[key] = v === "" ? null : (catalog[key] || [])[Number(v)] || null;
    recompute();
  });

  detailToggle.addEventListener("click", () => {
    const hidden = detailEl.classList.toggle("hidden");
    detailToggle.textContent = hidden ? "▸ Détail du calcul" : "▾ Détail du calcul";
  });

  // coordsLine optionnelle, insérée dans le template juste après l'en-tête DEVIS NOTOX.
  // Vide → pas de ligne « Vos coordonnées » (cas copier/SMS où l'email n'est pas connu).
  function buildFullMessage(coordsLine = "") {
    const { total, lines } = buildLines();
    if (total <= 0) return null;
    const RULE = "─────────────────────────";
    const out = [
      "Bonjour,",
      "",
      "Merci pour votre visite à l'atelier. Voici pour mémoire l'estimation de prix de votre projet de planche :",
      "",
      "────── DEVIS NOTOX ──────",
    ];
    if (coordsLine) out.push(coordsLine);
    out.push(
      ...lines,
      RULE,
      `TOTAL : ${fmtEuro(total)}`,
      RULE,
      "",
      "Merci pour l'intérêt que vous portez à notre démarche et la qualité de notre travail.",
      "Nous restons à votre entière disposition.",
      "",
      "À très bientôt,",
      "L'équipe NOTOX 🤙",
    );
    return out.join("\n");
  }

  function openExternalLink(url) {
    const a = document.createElement("a");
    a.href = url;
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  copyBtn.addEventListener("click", async () => {
    const text = buildFullMessage();
    if (!text) return; // bouton désactivé tant que total <= 0
    try {
      await navigator.clipboard.writeText(text);
      showToast("✓ Devis copié");
    } catch {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); showToast("✓ Devis copié"); }
      catch { showToast("⚠ Copie impossible"); }
      finally { ta.remove(); }
    }
  });

  emailBtn.addEventListener("click", () => {
    if (buildFullMessage() === null) return; // bouton désactivé tant que total <= 0
    // On passe la fonction (et non le texte pré-construit) pour pouvoir
    // re-générer le body avec la ligne « Vos coordonnées » dès que l'email
    // ou le téléphone change dans la sous-modal.
    openCalcEmailModal(buildFullMessage);
  });

  smsBtn.addEventListener("click", () => {
    const text = buildFullMessage();
    if (!text) return; // bouton désactivé tant que total <= 0
    // sms:?body=... est compatible iOS et Android modernes
    openExternalLink(`sms:?&body=${encodeURIComponent(text)}`);
  });

  recompute();
}

        <div>
          <label class="field-label" for="qm-to">Email du client</label>
          <input id="qm-to" class="field-input" type="email" placeholder="prenom.nom@exemple.com" autocomplete="email" inputmode="email">
        </div>
        <div class="modal-info-banner" style="background:rgba(100,116,139,.14); border-color:rgba(100,116,139,.3); color:var(--text);">
          📋 En copie automatique : <b>contact@notoxsurf.com</b>
        </div>
        <div>
          <label class="field-label" for="qm-phone">Téléphone client</label>
          <input id="qm-phone" class="field-input" type="tel" inputmode="tel" placeholder="06 12 34 56 78" autocomplete="tel">
        </div>
        <div>
          <label class="field-label" for="qm-subject">Sujet</label>
          <input id="qm-subject" class="field-input" type="text" value="${escapeHtml(SUBJECT_PREFIX.trimEnd())}">
        </div>
        <div>
          <label class="field-label" for="qm-body">Message</label>
          <textarea id="qm-body" class="field-textarea" spellcheck="true" style="min-height:280px;">${escapeHtml(initialBody)}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" data-close>Annuler</button>
        <button class="btn-modal-send" id="qm-send">📨 Envoyer</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  function close() {
    overlay.remove();
    document.removeEventListener("keydown", onKey);
  }
  function onKey(e) { if (e.key === "Escape") { close(); e.stopPropagation(); } }
  document.addEventListener("keydown", onKey);
  overlay.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", close));
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });

  const toEl      = overlay.querySelector("#qm-to");
  const phoneEl   = overlay.querySelector("#qm-phone");
  const subjectEl = overlay.querySelector("#qm-subject");
  const bodyEl    = overlay.querySelector("#qm-body");
  const sendBtn   = overlay.querySelector("#qm-send");

  // Construit la ligne « Vos coordonnées » à partir de l'état courant des champs.
  // Vide si email vide → buildBody("") n'insère rien dans le template.
  function currentCoordsLine() {
    const email = toEl.value.trim();
    if (!email) return "";
    const phone = phoneEl.value.trim();
    return phone ? `Vos coordonnées : ${email} — ${phone}` : `Vos coordonnées : ${email}`;
  }

  // Auto-sync sujet ← email + téléphone tant que l'utilisateur n'a pas édité le sujet à la main.
  let subjectAuto = true;
  subjectEl.addEventListener("input", () => { subjectAuto = false; });
  function syncSubject() {
    if (!subjectAuto) return;
    const email = toEl.value.trim();
    const phone = phoneEl.value.trim();
    const base = email ? SUBJECT_PREFIX + email : SUBJECT_PREFIX.trimEnd();
    subjectEl.value = phone ? `${base} — ${phone}` : base;
  }

  // Auto-sync body ← email + téléphone (re-build via buildBody pour insérer la ligne
  // « Vos coordonnées » dans le template). Préserve les édits manuels via bodyAuto.
  let bodyAuto = true;
  bodyEl.addEventListener("input", () => { bodyAuto = false; });
  function syncBody() {
    if (!bodyAuto) return;
    bodyEl.value = buildBody(currentCoordsLine());
  }

  toEl.addEventListener("input", () => { syncSubject(); syncBody(); });
  phoneEl.addEventListener("input", () => { syncSubject(); syncBody(); });

  sendBtn.addEventListener("click", async () => {
    const to      = toEl.value.trim();
    const subject = subjectEl.value.trim();
    if (!to)                                          { showToast("⚠ Email destinataire vide"); toEl.focus(); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to))       { showToast("⚠ Email invalide"); toEl.focus(); return; }
    if (!subject)                                     { showToast("⚠ Sujet vide"); subjectEl.focus(); return; }

    // Body envoyé : si l'utilisateur n'a pas édité la textarea (bodyAuto), on rebuild
    // proprement à partir du template pour garantir la présence de « Vos coordonnées ».
    // Sinon on respecte ses édits tels quels.
    const finalBody = (bodyAuto ? buildBody(currentCoordsLine()) : bodyEl.value).trim();
    if (!finalBody) { showToast("⚠ Message vide"); bodyEl.focus(); return; }

    sendBtn.disabled = true;
    sendBtn.innerHTML = `<span class="spinner-xs"></span> Envoi…`;
    try {
      const resp = await fetch(`${CONFIG.backendUrl}/send-quote`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-secret": CONFIG.apiSecret },
        body: JSON.stringify({
          to,
          cc: ["contact@notoxsurf.com"],
          subject,
          body_text: finalBody,
        }),
      });
      if (!resp.ok) {
        const txt = await resp.text().catch(() => "");
        throw new Error(`HTTP ${resp.status}${txt ? " — " + txt.slice(0, 200) : ""}`);
      }
      await resp.json().catch(() => ({}));
      close();
      showToast("✓ Devis envoyé");
    } catch (err) {
      console.error(err);
      sendBtn.disabled = false;
      sendBtn.innerHTML = "📨 Envoyer";
      showToast("⚠ Envoi échoué : " + err.message);
    }
  });

  setTimeout(() => toEl?.focus(), 50);
}

// Construit les items pré-remplis depuis les lignes Odoo (voir Décision 2) :
// line_section ignorée, line_note concaténée dans le libellé du produit précédent.
function buildInitialSupplierItems(order) {
  const lines = order.lines_detail || [];
  const items = [];
  let current = null;
  for (const l of lines) {
    const dt = l.display_type;
    if (dt === "line_section") { current = null; continue; }
    if (dt === "line_note") {
      if (current) {
        const noteText = (l.name || "").trim();
        if (noteText) current.labelParts.push(noteText);
      }
      continue;
    }
    // produit
    const baseLabel = l.product_id?.[1] || l.name || "";
    current = {
      id: `odoo-${l.id}`,
      source: "odoo",
      baseLabel,
      labelParts: [],
      qty: Number(l.product_uom_qty) || 1,
      checked: false,
    };
    items.push(current);
  }
  return items.map(it => ({
    id: it.id,
    source: it.source,
    label: it.labelParts.length ? it.labelParts.join(" — ") : it.baseLabel,
    qty: it.qty,
    checked: it.checked,
  }));
}

function openSupplierCartModal(order, stepLabel, stepId, progress) {
  const step = STEPS.find(s => s.id === stepId);
  const allowedNames = (step && step.fourn) || [];
  if (allowedNames.length === 0) { showToast("⚠ Pas de fournisseur pour cette étape"); return; }

  // Fournisseurs autorisés (même manquants dans suppliersByKey, on les liste)
  const candidates = allowedNames.map(n => {
    const key = supplierNameToKey(n);
    const row = S.suppliersByKey[key] || null;
    return { name: n, key, row };
  }).filter(c => !c.row || c.row.active !== false);

  let selectedKey = candidates[0]?.key || null;
  let lines = buildInitialSupplierItems(order);
  // manualIds pour générer des ids uniques sur les lignes manuelles
  let manualCounter = 0;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-card" role="dialog" aria-modal="true">

        <div class="modal-title">

        </div>
        <button class="modal-close" data-close aria-label="Fermer">×</button>
      </div>
      <div class="modal-body">
        <div>
          <label class="field-label">Fournisseur</label>
          <div class="supplier-radio-row" id="sc-radios"></div>
        </div>
        <div>
          <label class="field-label">Lignes de la commande client</label>
          <div id="sc-lines"></div>
          <button type="button" class="btn-add-line" id="sc-add-line">+ Ajouter une ligne manuelle</button>
        </div>
        <div>
          <label class="field-label" for="sc-notes">Notes (optionnel)</label>

  document.body.appendChild(overlay);
  document.body.style.overflow = "hidden";
  document.body.style.position = "fixed";

  const radiosEl = overlay.querySelector("#sc-radios");
  const linesEl  = overlay.querySelector("#sc-lines");
  const notesEl  = overlay.querySelector("#sc-notes");

  function renderRadios() {

    radiosEl.querySelectorAll("input[type=radio]").forEach(inp => {

  function renderLines() {
    linesEl.innerHTML = lines.map((l, i) => `
      <div class="supplier-line-row" data-idx="${i}">
        <input type="checkbox" data-chk="${i}" ${l.checked?"checked":""}>
        <input class="sl-label" data-lbl="${i}" type="text" value="${escapeHtml(l.label||"")}">
        <input class="sl-qty"   data-qty="${i}" type="number" min="0" step="any" value="${fmtQty(l.qty)}">

    linesEl.querySelectorAll("[data-chk]").forEach(el => el.addEventListener("change", e => {

  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });

  function collectSelection() {
    if (!selectedKey) { showToast("⚠ Choisis un fournisseur"); return null; }
    const picked = lines.filter(l => l.checked && (l.label||"").trim() && Number(l.qty) > 0);
    if (picked.length === 0) { showToast("⚠ Aucune ligne cochée"); return null; }
    return { key:selectedKey, picked, notes: notesEl.value.trim() };
  }

  async function insertIntoCart(key, picked, notes) {
    // Un seul batch_group_id pour toute l'insertion : ces items partagent la même note
    // et seront rendus dans un seul bloc côté mail.
    const batchGroupId = crypto.randomUUID();
    // Règle spéciale Ben : préfixer la note par le nom du client pour qu'il identifie
    // le destinataire final sur les blanks/preshapes. Silent fallback si pas de nom.
    const clientName = (order.partner_detail?.name || "").trim();
    let finalNotes = notes || null;
    if (key === "ben" && clientName) {
      finalNotes = notes ? `${clientName} / ${notes}` : clientName;
    }
    const rows = picked.map(l => ({
      supplier_key: key,
      order_id: order.id,
      order_ref: order.name || null,
      step_id: stepId,
      product_label: l.label.trim(),
      qty: Number(l.qty) || 1,
      source: l.source,
      notes: finalNotes,
      batch_group_id: batchGroupId,
      added_by: S.user?.email || null,
    }));
    const { data, error } = await sb.from("supplier_cart_items").insert(rows).select();
    if (error) throw error;
    // refresh local state
    (data || []).forEach(r => S.supplierCartItems.push(r));
    return data || [];
  }

  btnAdd.addEventListener("click", async () => {
    const sel = collectSelection(); if (!sel) return;
    btnAdd.disabled = true; btnAdd.textContent = "…";
    try {
      const inserted = await insertIntoCart(sel.key, sel.picked, sel.notes);
      close();
      const supplierName = S.suppliersByKey[sel.key]?.name || sel.key;
      showToast(`✓ ${inserted.length} article(s) ajouté(s) au panier ${supplierName}`);
      render();
    } catch (err) {
      console.error(err);
      btnAdd.disabled = false; btnAdd.textContent = "🧺 Ajouter au panier";
      showToast("⚠ Erreur : " + (err.message || err));
    }
  });

  btnSend.addEventListener("click", async () => {
    const sel = collectSelection(); if (!sel) return;
    const supplier = S.suppliersByKey[sel.key];
    if (!supplier || !supplier.email) { showToast("⚠ Email fournisseur manquant — renseigne-le dans Réglages"); return; }
    btnSend.disabled = true; btnSend.innerHTML = `<span class="spinner-xs"></span> Insertion…`;
    try {
      // Flux A unifié : on insère les items puis on ouvre la modal d'envoi (éditable).
      // L'envoi effectif passe par openSupplierSendPreview → sendSupplierBatch avec
      // subject/header/footer overrides issus des textareas. Pas d'envoi direct.
      // rollbackOnCancel : si l'utilisateur annule l'aperçu, on retire les items
      // qu'on vient d'insérer (sémantique "envoi immédiat", pas "ajout au panier").
      const inserted = await insertIntoCart(sel.key, sel.picked, sel.notes);
      close();
      render();
      openSupplierSendPreview(supplier, inserted, {
        rollbackOnCancel: true,
        rollbackIds: inserted.map(it => it.id),
      });
    } catch (err) {
      console.error(err);
      btnSend.disabled = false; btnSend.innerHTML = "📨 Envoyer (avec aperçu)";
      showToast("⚠ Erreur : " + (err.message || err));
    }
  });
}

// Groupe les items par batch_group_id pour produire des blocs {note, items}.
// Ordre : groupes triés par added_at du 1er item de chaque groupe (ascendant).
// Fallback legacy : si aucun item n'a de batch_group_id (relance d'ancien batch),
// on rend UN seul bloc sans note.
function groupItemsByBatch(items) {
  const hasAnyGroup = items.some(it => it && it.batch_group_id);
  if (!hasAnyGroup) {
    return [{ note: null, items }];
  }
  const byGroup = new Map();
  const orderedGroups = [];
  for (const it of items) {
    const gid = it.batch_group_id || it.id;
    if (!byGroup.has(gid)) {
      byGroup.set(gid, {
        note: it.notes || null,
        items: [],
        firstAddedAt: it.added_at || "",
      });
      orderedGroups.push(gid);
    }
    byGroup.get(gid).items.push(it);
  }
  orderedGroups.sort((a, b) => {
    const ta = byGroup.get(a).firstAddedAt || "";
    const tb = byGroup.get(b).firstAddedAt || "";
    return ta.localeCompare(tb);
  });
  return orderedGroups.map(gid => ({
    note: byGroup.get(gid).note,
    items: byGroup.get(gid).items,
  }));
}

// Simplifie un item complet en payload minimal pour le backend.
function itemToPayload(it) {
  return {
    id: it.id,
    product_label: it.product_label,
    qty: Number(it.qty) || 1,
    order_ref: it.order_ref || null,
  };
}

// Envoie un batch au backend /supplier-cart/send puis met à jour Supabase.
// itemsToSend : items complets issus de supplier_cart_items (DB rows) — doivent
//   contenir au minimum id, product_label, qty, order_ref, plus batch_group_id,
//   notes, added_at pour que le groupement par bloc fonctionne. Pour une relance
//   (origin items sans batch_group_id), fallback 1 bloc unique.
// opts : {
//   orderId, stepId        — si fournis, écrits dans supplier_messages_log (utile à la relance)
//   isReminder             — true → skip update cart_items, insert log avec is_reminder=true
//   parentBatchId          — id du batch d'origine (requis si isReminder=true)
//   subjectOverride        — sujet à envoyer au backend (relance : "RELANCE — …")
//   headerOverride         — en-tête à envoyer au backend
//   footerOverride         — pied à envoyer au backend (édition ponctuelle modal envoi)
// }
//
// Atomicité :
//  - Backend KO → throw (caller affiche "Envoi échoué"). Aucune écriture Supabase.
//  - Backend OK mais update cart_items KO → mail parti, showToast WARNING explicite, return {warning}.
//  - Backend OK + update OK mais insert log KO → mail parti + items marqués sent,
//    showToast WARNING moins grave, return {warning}.
// Dans tous les cas post-envoi, loadSupplierCart() + loadSupplierSendHistory() sont rejoués (try/finally).
async function sendSupplierBatch(supplier, itemsToSend, opts = {}) {
  if (!supplier?.email) throw new Error("Email fournisseur manquant");
  if (!itemsToSend || itemsToSend.length === 0) throw new Error("Aucun article à envoyer");

  const {
    orderId = null, stepId = null,
    isReminder = false, parentBatchId = null,
    subjectOverride = null, headerOverride = null, footerOverride = null,
  } = opts;

  const ctx = { date: window.SUPPLIER_TEMPLATES.formatDate(), supplier_name: supplier.name };
  const subject = subjectOverride != null
    ? subjectOverride
    : window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_subject || window.SUPPLIER_TEMPLATES.defaultSubject, ctx);
  const header  = headerOverride  != null
    ? headerOverride
    : window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_header  || window.SUPPLIER_TEMPLATES.defaultHeader,  ctx);
  const footer  = footerOverride  != null
    ? footerOverride
    : window.SUPPLIER_TEMPLATES.applyPlaceholders(supplier.template_footer  || window.SUPPLIER_TEMPLATES.defaultFooter,  ctx);

  const groupedBlocks = groupItemsByBatch(itemsToSend);
  const blocks = groupedBlocks.map(block => ({
    note: block.note,
    items: block.items.map(itemToPayload),
  }));

  const payload = {
    supplier_key:  supplier.key,
    supplier_name: supplier.name,
    supplier_email: supplier.email,
    cc: supplier.cc || [],
    subject, header, footer,
    blocks,
    sent_by: S.user?.email || null,
  };

  // ── Étape 1 : backend (envoi SMTP). Si KO → throw normal (aucune écriture Supabase).
  const resp = await fetch(`${CONFIG.backendUrl}/supplier-cart/send`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-secret": CONFIG.apiSecret },
    body: JSON.stringify(payload),
  });
  if (!resp.ok) {
    const txt = await resp.text().catch(() => "");
    throw new Error(`HTTP ${resp.status}${txt ? " — " + txt.slice(0, 240) : ""}`);
  }
  const out = await resp.json();
  const batchId = out.batch_id;
  const sentAt  = out.sent_at || new Date().toISOString();

  // ── À partir d'ici le mail est PARTI. Les erreurs Supabase sont des warnings, pas des throws.
  let warning = null;
  try {
    const logRow = {
      batch_id: batchId,
      supplier_key: supplier.key,
      supplier_email: supplier.email,
      subject: out.subject || subject,
      body_html: out.body_html || null,
      item_count: out.item_count || itemsToSend.length,
      sent_by: S.user?.email || null,
      order_id: orderId,
      step_id: stepId,
      is_reminder: !!isReminder,
      parent_batch_id: isReminder ? parentBatchId : null,
    };

    if (isReminder) {
      // Relance : on NE touche PAS à supplier_cart_items. Insert log seul.
      const { error: logErr } = await sb.from("supplier_messages_log").insert(logRow);
      if (logErr) {
        console.error("insert supplier_messages_log (reminder) failed:", logErr);
        warning = `⚠️ Relance envoyée à ${supplier.name} (batch=${batchId}) mais historique non enregistré.`;
      }
    } else {
      // Envoi initial : update cart_items puis insert log.
      const ids = itemsToSend.map(it => it.id);
      const { error: upErr } = await sb
        .from("supplier_cart_items")
        .update({ sent_at: sentAt, batch_id: batchId })
        .in("id", ids);
      if (upErr) {
        console.error("update supplier_cart_items failed:", upErr);
        warning = `⚠️ Mail envoyé à ${supplier.name} (batch=${batchId}) mais sauvegarde panier échouée. Vérifie la vue Paniers et purge les éventuels doublons.`;
      } else {
        const { error: logErr } = await sb.from("supplier_messages_log").insert(logRow);
        if (logErr) {
          console.error("insert supplier_messages_log failed:", logErr);
          warning = `⚠️ Mail envoyé (batch=${batchId}) mais historique non enregistré. Les items sont bien marqués sent.`;
        }
      }
    }
  } finally {
    try { await Promise.all([loadSupplierCart(), loadSupplierSendHistory()]); }
    catch (e) { console.warn("supplier refresh failed:", e); }
  }

  if (warning) showToast(warning);
  return { out, batchId, warning };
}
